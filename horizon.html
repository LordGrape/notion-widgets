cv.style.cursor = 'pointer';
function getBlipFromEvent(e) {
  var rect = cv.getBoundingClientRect();
  var cx = e.clientX, cy = e.clientY;
  if (e.changedTouches && e.changedTouches.length) {
    cx = e.changedTouches[0].clientX;
    cy = e.changedTouches[0].clientY;
  }
  var mx = (cx - rect.left) * (SZ / rect.width);
  var my = (cy - rect.top) * (SZ / rect.height);
  var hit = null, best = 28;
  blips.forEach(function(b) {
    var dx = mx - b.x, dy = my - b.y;
    var d = Math.sqrt(dx * dx + dy * dy);
    if (d < best) { best = d; hit = b; }
  });
  return hit;
}
function handleRadarTap(e) {
  var hit = getBlipFromEvent(e);
  if (!hit) return;
  var m = items.find(function(x) { return x.n === hit.n; });
  if (m) { playClick(); showPopup(m); }
}
cv.addEventListener('click', handleRadarTap);
cv.addEventListener('touchend', function(e) { e.preventDefault(); handleRadarTap(e); });

blipOv.addEventListener('click', function(e) {
  if (e.target === blipOv) { playClick(); blipOv.classList.remove('show'); }
});
blipOv.addEventListener('touchend', function(e) {
  if (e.target === blipOv) { playClick(); blipOv.classList.remove('show'); }
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    playClick();
    blipOv.classList.remove('show');
    closeRadial();
  }
});

/* ══════════════════════════════════════
   10. INITIAL SUMMONING ANIMATION
   ══════════════════════════════════════ */

var summonActive = true;
var summonStart = -1;
var SUMMON_DUR = 3000;

var sParts = [];
for (var _sp = 0; _sp < 50; _sp++) {
  var _sa = Math.random() * Math.PI * 2;
  sParts.push({
    angle: _sa,
    dist: 70 + Math.random() * 50,
    size: 0.8 + Math.random() * 2,
    speed: 0.6 + Math.random() * 0.4,
    phase: Math.random() * Math.PI * 2,
    orbit: 0.001 + Math.random() * 0.002
  });
}

function drawSummonAnim(t) {
  if (summonStart < 0) {
    summonStart = t;
    try { _playSummonIntro(); } catch(e) {}
  }
  var elapsed = t - summonStart;
  var p = Math.min(elapsed / SUMMON_DUR, 1);
  dctx.clearRect(0, 0, DSZ, DSZ);

  /* Phase 1 (0-0.55): Particles converge with orbital motion */
  if (p < 0.8) {
    var converge = Math.min(p / 0.55, 1);
    converge = converge * converge;
    for (var i = 0; i < sParts.length; i++) {
      var sp = sParts[i];
      sp.angle += sp.orbit * (1 + converge * 3);
      var d = sp.dist * (1 - converge * 0.92);
      var wobble = Math.sin(elapsed * 0.005 + sp.phase) * (1 - converge) * 12;
      var px = DC + Math.cos(sp.angle) * d + Math.cos(sp.angle + Math.PI / 2) * wobble;
      var py = DC + Math.sin(sp.angle) * d + Math.sin(sp.angle + Math.PI / 2) * wobble;
      var alpha = Math.min(p * 4, 1) * (0.4 + 0.6 * (1 - converge * 0.4));
      var pg = dctx.createRadialGradient(px, py, 0, px, py, sp.size * 4);
      pg.addColorStop(0, 'rgba(' + (dark ? '167,139,250' : '139,92,246') + ',' + (alpha * 0.35) + ')');
      pg.addColorStop(1, 'rgba(138,92,246,0)');
      dctx.beginPath(); dctx.arc(px, py, sp.size * 4, 0, Math.PI * 2);
      dctx.fillStyle = pg; dctx.fill();
      dctx.beginPath(); dctx.arc(px, py, sp.size * (1 - converge * 0.3), 0, Math.PI * 2);
      dctx.fillStyle = 'rgba(' + (dark ? '200,180,255' : '160,120,246') + ',' + alpha + ')';
      dctx.fill();
    }
  }

  /* Phase 2 (0.2-0.85): Core energy builds */
  if (p > 0.2 && p < 0.85) {
    var coreP = Math.min((p - 0.2) / 0.5, 1);
    var coreR = 4 + coreP * 35;
    var pulse = 1 + Math.sin(elapsed * 0.008) * 0.15;
    var cg = dctx.createRadialGradient(DC, DC, 0, DC, DC, coreR * pulse);
    cg.addColorStop(0, 'rgba(' + (dark ? '167,139,250' : '139,92,246') + ',' + (coreP * 0.55) + ')');
    cg.addColorStop(0.4, 'rgba(' + (dark ? '139,92,246' : '124,58,237') + ',' + (coreP * 0.2) + ')');
    cg.addColorStop(1, 'rgba(138,92,246,0)');
    dctx.beginPath(); dctx.arc(DC, DC, coreR * pulse, 0, Math.PI * 2);
    dctx.fillStyle = cg; dctx.fill();
    var dotR = 2 + coreP * 3;
    dctx.beginPath(); dctx.arc(DC, DC, dotR, 0, Math.PI * 2);
    dctx.fillStyle = 'rgba(' + (dark ? '220,210,255' : '180,160,246') + ',' + (coreP * 0.8) + ')';
    dctx.fill();
  }

  /* Energy rings pulsing inward */
  if (p > 0.15 && p < 0.75) {
    var ringP = (p - 0.15) / 0.6;
    for (var ri = 0; ri < 3; ri++) {
      var rPhase = (ringP * 2.5 + ri * 0.33) % 1;
      var ringR = 80 * (1 - rPhase);
      var ringA = Math.sin(rPhase * Math.PI) * 0.25;
      dctx.beginPath(); dctx.arc(DC, DC, ringR, 0, Math.PI * 2);
      dctx.strokeStyle = 'rgba(' + (dark ? '167,139,250' : '139,92,246') + ',' + ringA + ')';
      dctx.lineWidth = 1.2 * (1 - rPhase);
      dctx.stroke();
    }
  }

  /* Phase 3 (0.6-1.0): Flash + dragon materialises */
  if (p > 0.6) {
    var revealP = (p - 0.6) / 0.4;
    if (revealP < 0.3) {
      var flashA = Math.sin(revealP / 0.3 * Math.PI) * (dark ? 0.2 : 0.15);
      dctx.fillStyle = 'rgba(' + (dark ? '167,139,250' : '200,180,255') + ',' + flashA + ')';
      dctx.fillRect(0, 0, DSZ, DSZ);
    }
    var dragonA = Math.max(0, (revealP - 0.1) / 0.9);
    dragonA = 1 - Math.pow(1 - dragonA, 2);
    dctx.globalAlpha = dragonA;
    var stage = getStage(DS.xp);
    if (stage === 0) drawEgg(dctx, t);
    else if (stage === 1) drawHatchling(dctx, t);
    else if (stage === 2) drawFledgling(dctx, t);
    else if (stage === 3) drawJuvenile(dctx, t);
    else if (stage === 4) drawAdult(dctx, t);
    else drawElder(dctx, t);
    dctx.globalAlpha = 1;
    if (revealP < 0.6) {
      var scatterA = (1 - revealP / 0.6) * 0.35;
      for (var si = 0; si < sParts.length; si += 2) {
        var spp = sParts[si];
        var sd = revealP * 55 * spp.speed;
        var spx = DC + Math.cos(spp.angle) * sd;
        var spy = DC + Math.sin(spp.angle) * sd;
        dctx.beginPath(); dctx.arc(spx, spy, spp.size * 0.7, 0, Math.PI * 2);
        dctx.fillStyle = 'rgba(' + (dark ? '167,139,250' : '139,92,246') + ',' + scatterA + ')';
        dctx.fill();
      }
    }
  }

  if (p >= 1) summonActive = false;
}

/* Summoning sound: ethereal ascending tone */
function _playSummonIntro() {
  var ctx = getAudioCtx(), now = ctx.currentTime;
  var osc = ctx.createOscillator();
  var gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(180, now);
  osc.frequency.exponentialRampToValueAtTime(520, now + 2.0);
  gain.gain.setValueAtTime(0.001, now);
  gain.gain.linearRampToValueAtTime(0.07, now + 0.5);
  gain.gain.setValueAtTime(0.07, now + 1.2);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(now); osc.stop(now + 2.6);
  var osc2 = ctx.createOscillator();
  var gain2 = ctx.createGain();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(360, now + 0.3);
  osc2.frequency.exponentialRampToValueAtTime(780, now + 2.0);
  gain2.gain.setValueAtTime(0.001, now + 0.3);
  gain2.gain.linearRampToValueAtTime(0.035, now + 0.8);
  gain2.gain.exponentialRampToValueAtTime(0.001, now + 2.4);
  osc2.connect(gain2); gain2.connect(ctx.destination);
  osc2.start(now + 0.3); osc2.stop(now + 2.5);
}

/* ══════════════════════════════════════
   11. ANIMATION LOOPS
   ══════════════════════════════════════ */

var running = true, lastFrame = 0;
var prefersRM = Core.reducedMotion;

function loop(t) {
  if (!running) return;
  if (prefersRM) {
    drawDragon(0);
    drawRadar(0);
    return;
  }
  if (t - lastFrame < 32) { requestAnimationFrame(loop); return; }
  lastFrame = t;

  if (summonActive && activeTab === 'dragon') drawSummonAnim(t);
  else if (activeTab === 'dragon') { checkWant(t); drawDragon(t); }
  else drawRadar(t);

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

document.addEventListener('visibilitychange', function() {
  if (document.hidden) { running = false; }
  else {
    running = true;
    DS.lastVisit = new Date().toISOString();
    saveDS(DS);
    requestAnimationFrame(loop);
  }
});

</script>

<script>
/* ══════════════════════════════════════
   THYMOS ↔ RADAR INTEGRATION
   ══════════════════════════════════════
   1. Real milestones replace old events
   2. Milestone completion → XP rewards
   3. Dragon stage → radar glow
   4. Horizon Power dynamic header
   ══════════════════════════════════════ */

if (typeof CATS === 'undefined') window.CATS = { academic:'#8b5cf6', military:'#22c55e', career:'#f59e0b', personal:'#ec4899' };

/* ── 1. Replace milestones ── */
EVENTS = [
  { id:'graduation', name:'UWindsor Graduation', date:'2026-06-02', cat:'academic', color:'#8b5cf6', icon:'🎓', xp:1500, desc:'B.A. Honours — University of Windsor' },
  { id:'bmq', name:'BMQ Graduation Weekend', date:'2026-06-07', cat:'military', color:'#22c55e', icon:'🎖️', xp:2000, desc:'Basic Military Qualification — CAF' },
  { id:'lawschool', name:"Queen's Law — 1L Start", date:'2026-09-08', cat:'academic', color:'#8b5cf6', icon:'⚖️', xp:1000, desc:"Juris Doctor Year 1 — Queen's University" },
  { id:'birthday', name:'Birthday', date:'2026-10-20', cat:'personal', color:'#ec4899', icon:'🎂', xp:500, desc:'Another year of growth' }
];

/* Re-render events panel with real milestones */
(function() {
  var evsEl = document.getElementById('evs'), legEl = document.getElementById('leg');
  if (!evsEl) return;
  evsEl.innerHTML = '';
  var now = new Date();
  EVENTS.forEach(function(ev, i) {
    var diff = new Date(ev.date + 'T00:00:00') - now;
    var days = Math.ceil(diff / 86400000);
    var passed = days <= 0;
    var cdT, cdU;
    if (passed) { cdT = '✓'; cdU = 'DONE'; }
    else if (days > 60) { var m = Math.round(days / 30.44); cdT = m; cdU = m === 1 ? 'MONTH' : 'MONTHS'; }
    else { cdT = days; cdU = days === 1 ? 'DAY' : 'DAYS'; }
    var d = document.createElement('div');
    d.className = 'ev'; d.style.animationDelay = (0.15 + i * 0.1) + 's';
    var col = CATS[ev.cat] || '#8b5cf6';
    d.innerHTML = '<div class="ev-dot" style="background:' + col + (passed ? ';opacity:0.4' : '') + '"></div>' +
      '<div class="ev-body"><div class="ev-name">' + ev.icon + ' ' + ev.name + '</div>' +
      '<div class="ev-meta">' + new Date(ev.date + 'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) + '</div></div>' +
      '<div class="ev-cd"><div class="ev-val"' + (passed ? ' style="color:#22c55e"' : '') + '>' + cdT + '</div>' +
      '<div class="ev-unit">' + cdU + '</div></div>';
    if (typeof showBlip === 'function') {
      d.style.cursor = 'pointer';
      d.addEventListener('click', (function(e){ return function(){ showBlip(e); }; })(ev));
    }
    evsEl.appendChild(d);
  });
  if (legEl) {
    legEl.innerHTML = ''; var seen = {};
    EVENTS.forEach(function(ev) {
      if (seen[ev.cat]) return; seen[ev.cat] = true;
      var li = document.createElement('div'); li.className = 'legend-i';
      li.innerHTML = '<div class="legend-d" style="background:' + (CATS[ev.cat]||'#8b5cf6') + '"></div><span class="legend-t">' + ev.cat + '</span>';
      legEl.appendChild(li);
    });
  }
})();

/* ── 2. Milestone → XP on date pass ── */
(function() {
  var now = new Date(), any = false;
  var cl = JSON.parse(localStorage.getItem('dragon_milestone_claimed') || '{}');
  EVENTS.forEach(function(ev) {
    if (cl[ev.id]) return;
    if (now >= new Date(ev.date + 'T00:00:00')) {
      var r = Math.floor((ev.xp||500) * xpMult(DS));
      if (r > 0) { DS.xp += r; any = true; }
      cl[ev.id] = now.toISOString();
      setTimeout(function(){ showXPFloat('🎯 ' + ev.icon + ' +' + r + ' XP'); }, 800);
    }
  });
  if (any) {
    localStorage.setItem('dragon_milestone_claimed', JSON.stringify(cl));
    saveDS(DS);
    var ns = getStage(DS.xp);
    if (ns > prevStage) { prevStage = ns; showEvolution(ns); }
    if (typeof checkAch === 'function') checkAch();
  }
})();

/* ── 3. Dragon stage → radar glow + title ── */
(function() {
  var stage = getStage(DS.xp);
  var rd = document.querySelector('.radar');
  if (rd) {
    var g = 2 + stage * 4, gold = stage / 5;
    var cr = Math.round(138 + gold * 113), cg2 = Math.round(92 + gold * 99), cb = Math.round(246 - gold * 210);
    rd.style.filter = 'drop-shadow(0 0 ' + g + 'px rgba(' + cr + ',' + cg2 + ',' + cb + ',0.' + (15 + stage * 8) + '))';
  }
  var pt = document.querySelector('.panel-title');
  if (pt) {
    var titles = ['Dormant Horizon','Awakening Horizon','Rising Horizon','Surging Horizon','Blazing Horizon','Transcendent Horizon'];
    pt.textContent = titles[stage] || 'Mission Timeline';
  }
})();

/* ── 4. Horizon Power header ── */
function getHorizonPower() {
  var s = getStage(DS.xp), cur = STAGES[s].xp, nxt = nextStageXP(DS.xp);
  var xpP = nxt > cur ? (DS.xp - cur) / (nxt - cur) : 1;
  var now = Date.now(), closest = Infinity;
  EVENTS.forEach(function(ev) { var d = new Date(ev.date+'T00:00:00').getTime()-now; if(d>0&&d<closest) closest=d; });
  var mileP = closest===Infinity ? 1 : Math.max(0, 1 - closest/(180*86400000));
  return Math.min(100, Math.round((xpP*0.5 + mileP*0.5)*100));
}
(function() {
  var el = document.getElementById('hdrTitle');
  if (!el) return;
  function upd() { el.textContent = '⚡ HORIZON ' + getHorizonPower() + '%'; }
  upd();
  setInterval(upd, 60000);
})();
</script>
</body>
</html>
