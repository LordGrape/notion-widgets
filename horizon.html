  var b1 = 0.15 + 0.14 * Math.pow(Math.sin(t * 0.004), 2);
  var b2 = 0.07 * Math.pow(Math.sin(t * 0.004 + 0.8), 4);
  var bTot = (b1 + b2) * mood + prox * 0.1;
  var gg = ctx.createRadialGradient(0, -4, 0, 0, -4, eh * 0.7);
  gg.addColorStop(0, 'rgba(' + (dark ? '167,139,250' : '139,92,246') + ',' + bTot + ')');
  gg.addColorStop(0.6, 'rgba(' + (dark ? '139,92,246' : '124,58,237') + ',' + (bTot * 0.25) + ')');
  gg.addColorStop(1, 'rgba(138,92,246,0)');
  ctx.beginPath(); ctx.ellipse(0, -4, ew + 4, eh + 4, 0, 0, Math.PI * 2);
  ctx.fillStyle = gg; ctx.fill();

  /* Specular highlight (3D) */
  var hlY = -18 + Math.sin(t * 0.0016) * 1.5;
  var hl = ctx.createRadialGradient(-9, hlY, 0, -9, hlY, 10);
  hl.addColorStop(0, 'rgba(255,255,255,' + (dark ? 0.28 : 0.4) + ')');
  hl.addColorStop(0.35, 'rgba(255,255,255,' + (dark ? 0.1 : 0.15) + ')');
  hl.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath(); ctx.ellipse(-9, hlY, 8, 4.5, -0.3, 0, Math.PI * 2);
  ctx.fillStyle = hl; ctx.fill();
  /* Secondary specular (sharp) */
  ctx.beginPath(); ctx.ellipse(-6, hlY - 3, 2.5, 1.5, -0.2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,' + (dark ? 0.2 : 0.32) + ')'; ctx.fill();
  /* Rim light */
  ctx.save(); ctx.scale(1, eh / ew);
  ctx.beginPath(); ctx.arc(0, -4 * (ew / eh), ew - 1, 0.15, Math.PI * 0.65);
  ctx.strokeStyle = 'rgba(' + (dark ? '200,180,255' : '167,139,250') + ',0.12)';
  ctx.lineWidth = 1.8; ctx.stroke(); ctx.restore();

  /* Cracks + light leaks */
  ctx.lineWidth = 1.2; ctx.lineCap = 'round';
  if (progress >= 0.25) {
    ctx.strokeStyle = dark ? 'rgba(255,255,255,0.45)' : 'rgba(255,255,255,0.55)';
    ctx.beginPath(); ctx.moveTo(-5, -22); ctx.lineTo(-3, -12); ctx.lineTo(-7, -6); ctx.stroke();
    if (progress >= 0.5) {
      var lk = 0.08 + 0.06 * Math.sin(t * 0.003);
      ctx.strokeStyle = 'rgba(' + (dark ? '167,139,250' : '139,92,246') + ',' + lk + ')';
      ctx.lineWidth = 3.5;
      ctx.beginPath(); ctx.moveTo(-5, -22); ctx.lineTo(-3, -12); ctx.lineTo(-7, -6); ctx.stroke();
      ctx.lineWidth = 1.2;
    }
  }
  if (progress >= 0.5) {
    ctx.strokeStyle = dark ? 'rgba(255,255,255,0.45)' : 'rgba(255,255,255,0.55)';
    ctx.beginPath(); ctx.moveTo(7, -18); ctx.lineTo(4, -8); ctx.lineTo(9, -1); ctx.stroke();
    if (progress >= 0.75) {
      var lk2 = 0.08 + 0.06 * Math.sin(t * 0.003 + 1);
      ctx.strokeStyle = 'rgba(' + (dark ? '167,139,250' : '139,92,246') + ',' + lk2 + ')';
      ctx.lineWidth = 3.5;
      ctx.beginPath(); ctx.moveTo(7, -18); ctx.lineTo(4, -8); ctx.lineTo(9, -1); ctx.stroke();
      ctx.lineWidth = 1.2;
    }
  }
  if (progress >= 0.75) {
    ctx.strokeStyle = dark ? 'rgba(255,255,255,0.45)' : 'rgba(255,255,255,0.55)';
    ctx.beginPath(); ctx.moveTo(-2, 4); ctx.lineTo(3, 12); ctx.lineTo(-1, 20); ctx.stroke();
    var hg = ctx.createRadialGradient(0, -4, 0, 0, -4, eh * 0.5);
    hg.addColorStop(0, 'rgba(' + (dark ? '167,139,250' : '139,92,246') + ',0.2)');
    hg.addColorStop(1, 'rgba(138,92,246,0)');
    ctx.beginPath(); ctx.ellipse(0, -4, ew, eh, 0, 0, Math.PI * 2);
    ctx.fillStyle = hg; ctx.fill();
  }

  ctx.restore();

  /* Orbiting particles (world space) */
  for (var pi = 0; pi < eggParts.length; pi++) {
    var ep = eggParts[pi];
    ep.a += ep.sp * (1 + prox * 1.5);
    var pd = ep.d + Math.sin(t * 0.001 + ep.ph) * ep.dr * 10;
    var pyo = Math.sin(t * 0.0008 + ep.ph) * 10;
    var ppx = cx + floatX + Math.cos(ep.a + t * 0.00015) * pd * 0.6;
    var ppy = cy + 6 + floatY + Math.sin(ep.a + t * 0.00015) * pd * 0.4 + pyo;
    var pa = (0.12 + 0.22 * Math.sin(t * 0.003 + ep.ph)) * mood;
    var pg = ctx.createRadialGradient(ppx, ppy, 0, ppx, ppy, ep.r * 3.5);
    pg.addColorStop(0, 'rgba(' + (dark ? '167,139,250' : '139,92,246') + ',' + pa + ')');
    pg.addColorStop(1, 'rgba(138,92,246,0)');
    ctx.beginPath(); ctx.arc(ppx, ppy, ep.r * 3.5, 0, Math.PI * 2);
    ctx.fillStyle = pg; ctx.fill();
    ctx.beginPath(); ctx.arc(ppx, ppy, ep.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + (dark ? '200,180,255' : '139,92,246') + ',' + (pa * 1.4) + ')';
    ctx.fill();
  }

  /* ГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•Вҗ
     AMBIENT SYSTEMS ГўВҖВ” Stage-aware
     Egg = baseline. Scales via getStage().
     ГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•Вҗ */
  var stage = getStage(DS.xp);

  /* === WEATHER PARTICLES === */
  if (weatherData) {
    var wType = weatherData.type;
    var wxCount = 6 + stage * 4;
    if (wType === 'rain' || wType === 'storm') {
      for (var wri = 0; wri < wxCount; wri++) {
        var wrx = cx - 60 + ((t * 0.03 + wri * 47) % 120);
        var wry = ((t * 0.08 + wri * 31) % (DSZ + 20)) - 10;
        var wrLen = 6 + Math.sin(wri * 2.3) * 3;
        var wrAlpha = wType === 'storm' ? 0.25 : 0.18;
        ctx.beginPath();
        ctx.moveTo(wrx, wry);
        ctx.lineTo(wrx - 1, wry + wrLen);
        ctx.strokeStyle = dark ? 'rgba(167,180,255,' + wrAlpha + ')' : 'rgba(100,130,200,' + (wrAlpha * 0.83) + ')';
        ctx.lineWidth = wType === 'storm' ? 1.0 : 0.8;
        ctx.stroke();
      }
      if (wType === 'storm' && Math.sin(t * 0.0007) > 0.97) {
        ctx.fillStyle = dark ? 'rgba(200,200,255,0.04)' : 'rgba(255,255,255,0.06)';
        ctx.fillRect(0, 0, DSZ, DSZ);
      }
    }
    if (wType === 'snow') {
      var snCount = Math.round(wxCount * 0.8);
      for (var wsi = 0; wsi < snCount; wsi++) {
        var wsx = cx - 55 + ((t * 0.01 + wsi * 53 + Math.sin(t * 0.0005 + wsi) * 15) % 110);
        var wsy = ((t * 0.025 + wsi * 37) % (DSZ + 10)) - 5;
        var wsSize = 1 + Math.sin(wsi * 1.7) * 0.6;
        ctx.beginPath();
        ctx.arc(wsx, wsy, wsSize, 0, Math.PI * 2);
        ctx.fillStyle = dark ? 'rgba(220,225,255,0.25)' : 'rgba(200,210,240,0.3)';
        ctx.fill();
      }
    }
    if (wType === 'clear') {
      var sunA = 0.04 + Math.sin(t * 0.0003) * 0.015 + stage * 0.008;
      var rayG = ctx.createLinearGradient(DSZ - 10, 10, cx - 20, cy + 30);
      rayG.addColorStop(0, 'rgba(255,220,120,' + sunA + ')');
      rayG.addColorStop(1, 'rgba(255,200,80,0)');
      ctx.fillStyle = rayG;
      ctx.fillRect(0, 0, DSZ, DSZ);
    }
    if (wType === 'fog') {
      for (var wfi = 0; wfi < 3; wfi++) {
        var wfx = cx + Math.sin(t * 0.0002 + wfi * 2.1) * 60;
        var wfy = cy + 20 + wfi * 15 + Math.sin(t * 0.0003 + wfi) * 8;
        var fogG = ctx.createRadialGradient(wfx, wfy, 0, wfx, wfy, 35);
        fogG.addColorStop(0, dark ? 'rgba(160,160,180,0.06)' : 'rgba(180,180,200,0.08)');
        fogG.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.beginPath(); ctx.arc(wfx, wfy, 35, 0, Math.PI * 2);
        ctx.fillStyle = fogG; ctx.fill();
      }
    }
    if (wType === 'cloudy') {
      var cloudA = 0.02 + Math.sin(t * 0.0004) * 0.008;
      ctx.fillStyle = dark ? 'rgba(100,100,120,' + cloudA + ')' : 'rgba(140,140,160,' + cloudA + ')';
      ctx.fillRect(0, 0, DSZ, DSZ);
    }
  }

  /* === TIME-OF-DAY AMBIENT PARTICLES === */
  var tdPhase = getDayPhase().phase;
  var tdCount = 6 + stage * 3;
  for (var tpi = 0; tpi < tdCount; tpi++) {
    var tpAngle = t * 0.0002 + tpi * 1.05;
    var tpDist = 50 + Math.sin(t * 0.0004 + tpi * 0.8) * 18;
    var tpx = cx + Math.cos(tpAngle) * tpDist;
    var tpy = cy + Math.sin(tpAngle) * tpDist * 0.6 + Math.sin(t * 0.0006 + tpi) * 8;
    var tpR = 0.6 + Math.sin(t * 0.002 + tpi * 1.3) * 0.3;
    var tpA = 0.15 + Math.sin(t * 0.001 + tpi * 2) * 0.1;
    if (tdPhase === 'morning') {
      tpy -= (t * 0.008 + tpi * 20) % 40;
      ctx.beginPath(); ctx.arc(tpx, tpy, tpR, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,210,120,' + tpA + ')';
      ctx.fill();
    } else if (tdPhase === 'evening') {
      var ffBlink = Math.pow(Math.sin(t * 0.003 + tpi * 1.7), 4);
      ctx.beginPath(); ctx.arc(tpx, tpy, tpR * (1 + ffBlink * 0.8), 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,180,60,' + (tpA * 0.6 + ffBlink * 0.3) + ')';
      ctx.fill();
      if (ffBlink > 0.5) {
        var ffG = ctx.createRadialGradient(tpx, tpy, 0, tpx, tpy, tpR * 4);
        ffG.addColorStop(0, 'rgba(255,180,60,' + (ffBlink * 0.08) + ')');
        ffG.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.beginPath(); ctx.arc(tpx, tpy, tpR * 4, 0, Math.PI * 2);
        ctx.fillStyle = ffG; ctx.fill();
      }
    } else if (tdPhase === 'night') {
      var starBlink = Math.pow(Math.sin(t * 0.004 + tpi * 2.3), 6);
      ctx.beginPath(); ctx.arc(tpx, tpy, tpR * 0.7, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(180,200,255,' + (tpA * 0.4 + starBlink * 0.35) + ')';
      ctx.fill();
    }
  }

  /* === RETURN RECOGNITION GLOW === */
  if (returnGlow > 0.01) {
    var rgR = 30 + returnGlow * 12;
    var rgA = returnGlow * 0.25;
    var rgG = ctx.createRadialGradient(cx + floatX, cy + 6 + floatY, 0, cx + floatX, cy + 6 + floatY, rgR);
    rgG.addColorStop(0, 'rgba(251,191,36,' + rgA + ')');
    rgG.addColorStop(0.5, 'rgba(167,139,250,' + (rgA * 0.4) + ')');
    rgG.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(cx + floatX, cy + 6 + floatY, rgR, 0, Math.PI * 2);
    ctx.fillStyle = rgG; ctx.fill();
    var glowDecay = 0.997 - stage * 0.0003;
    returnGlow *= glowDecay;
  }

  /* === PROXIMITY WARMTH === */
  var proxThreshold = 0.3 - stage * 0.04;
  var warmIntensity = 0.12 + stage * 0.03;
  if (prox > proxThreshold) {
    var warmA = (prox - proxThreshold) * warmIntensity;
    var warmR = 25 + prox * 15;
    for (var pwi = 0; pwi < 5 + stage; pwi++) {
      var pwAngle = t * 0.0008 + pwi * (Math.PI * 2 / (5 + stage));
      var pwDist = warmR + Math.sin(t * 0.002 + pwi) * 4;
      var pwx = cx + floatX + Math.cos(pwAngle) * pwDist;
      var pwy = cy + 6 + floatY + Math.sin(pwAngle) * pwDist * 0.7;
      var pwR = 1.2 + Math.sin(t * 0.003 + pwi * 1.5) * 0.5;
      var rise = (t * 0.015 + pwi * 8) % 20;
      pwy -= rise;
      var wFade = 1 - rise / 20;
      ctx.beginPath(); ctx.arc(pwx, pwy, pwR, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,200,140,' + (warmA * wFade) + ')';
      ctx.fill();
    }
  }

  /* === SEASONAL NEST ACCENTS === */
  if (curAct && curAct.id === 'sleep') {
    var _nRS = function(i) { var v = Math.sin(i * 127.1 + 311.7) * 43758.5453; return v - Math.floor(v); };
    var nCxS = cx, nCyS = cy + 44;
    ctx.save();
    ctx.globalAlpha = Math.min(1, actFade * 0.9);
    var month = new Date().getMonth();
    if (month >= 3 && month <= 5) {
      for (var spri = 0; spri < 5; spri++) {
        var sprx = nCxS - 28 + spri * 14 + _nRS(spri + 300) * 6;
        var spry = nCyS - 6 + _nRS(spri + 350) * 3;
        ctx.beginPath(); ctx.arc(sprx, spry, 1.2, 0, Math.PI * 2);
        ctx.fillStyle = dark ? 'rgba(100,200,120,0.25)' : 'rgba(80,180,100,0.2)';
        ctx.fill();
      }
    } else if (month >= 6 && month <= 8) {
      for (var sumi = 0; sumi < 4; sumi++) {
        var sumx = nCxS - 24 + sumi * 16 + _nRS(sumi + 400) * 8;
        var sumy = nCyS - 5 + _nRS(sumi + 450) * 4;
        ctx.beginPath(); ctx.arc(sumx, sumy, 0.8, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,210,80,0.2)';
        ctx.fill();
      }
    } else if (month >= 9 && month <= 10) {
      for (var auti = 0; auti < 6; auti++) {
        var autx = nCxS - 30 + auti * 12 + _nRS(auti + 500) * 8;
        var auty = nCyS - 4 + _nRS(auti + 550) * 5;
        ctx.beginPath(); ctx.arc(autx, auty, 1, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(200,' + Math.round(120 + _nRS(auti + 600) * 40) + ',60,0.2)';
        ctx.fill();
      }
    } else {
      for (var wnti = 0; wnti < 7; wnti++) {
        var wntx = nCxS - 32 + wnti * 10 + _nRS(wnti + 700) * 6;
        var wnty = nCyS - 7 + _nRS(wnti + 750) * 3;
        var frostA = 0.12 + Math.sin(t * 0.002 + wnti * 1.1) * 0.08;
        ctx.beginPath(); ctx.arc(wntx, wnty, 0.7, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(200,220,255,' + frostA + ')';
        ctx.fill();
      }
    }
    ctx.restore();
  }
}

function drawHatchling(ctx, t) {
  var cx = DC, cy = DC + 10;
  var avgBar = (DS.rations + DS.morale + DS.readiness) / 3;
  var mood = Math.max(0.2, avgBar / 100);

  /* Animation */
  var breathe = 1 + Math.sin(t * 0.002) * 0.025;
  var bob = Math.sin(t * 0.0012) * 2.5 * mood;
  var headTilt = Math.sin(t * 0.0008) * 0.05 * mood;

  /* Blink */
  blinkTimer += 16;
  if (!isBlinking && blinkTimer > blinkNext) { isBlinking = true; blinkTimer = 0; }
  if (isBlinking && blinkTimer > 150) { isBlinking = false; blinkTimer = 0; blinkNext = 2500 + Math.random() * 5000; }

  var alpha = 0.55 + mood * 0.45;
  ctx.globalAlpha = alpha;
  ctx.save();
  ctx.translate(cx, cy + bob);

  var bc = dark ? '#a78bfa' : '#8b5cf6';
  var belly = dark ? '#ddd6fe' : '#c4b5fd';
  var wc = dark ? '#8b5cf6' : '#7c3aed';
  var ec = dark ? '#c4b5fd' : '#7c3aed';
  var hc = dark ? '#c4b5fd' : '#a78bfa';

  var bw = 16 * breathe, bh = 20;
  var hr = 14, hy = -bh - hr + 8;

  /* Shadow */
  ctx.beginPath(); ctx.ellipse(0, bh + 6, 22, 5, 0, 0, Math.PI * 2);
  ctx.fillStyle = dark ? 'rgba(0,0,0,0.15)' : 'rgba(0,0,0,0.05)'; ctx.fill();

  /* Tail */
  ctx.beginPath(); ctx.moveTo(bw * 0.6, bh * 0.15);
  ctx.quadraticCurveTo(bw + 14, bh * 0.3, bw + 10, -6);
  ctx.strokeStyle = bc; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.stroke();
  /* Tail tip */
  ctx.beginPath();
  ctx.moveTo(bw + 10, -6); ctx.lineTo(bw + 14, -10); ctx.lineTo(bw + 8, -8);
  ctx.fillStyle = wc; ctx.fill();

  /* Back wing (left) */
  ctx.beginPath();
  ctx.moveTo(-bw * 0.4, -bh * 0.25);
  ctx.lineTo(-bw - 16, -bh - 12);
  ctx.lineTo(-bw - 4, -bh - 16);
  ctx.lineTo(-bw * 0.15, -bh * 0.05);
  ctx.closePath(); ctx.fillStyle = wc; ctx.fill();

  /* Body ГўВҖВ” 3D shading */
  ctx.beginPath(); ctx.ellipse(0, 0, bw, bh, 0, 0, Math.PI * 2);
  var bdG = ctx.createRadialGradient(-bw * 0.3, -bh * 0.35, bw * 0.08, bw * 0.08, bh * 0.08, Math.max(bw, bh) * 1.15);
  bdG.addColorStop(0, dark ? '#ddd6fe' : '#c4b5fd');
  bdG.addColorStop(0.35, bc);
  bdG.addColorStop(1, dark ? '#6d28d9' : '#5b21b6');
  ctx.fillStyle = bdG; ctx.fill();
  /* Body specular */
  var bsG = ctx.createRadialGradient(-bw * 0.25, -bh * 0.32, 0, -bw * 0.25, -bh * 0.32, bw * 0.32);
  bsG.addColorStop(0, 'rgba(255,255,255,0.2)'); bsG.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath(); ctx.ellipse(-bw * 0.25, -bh * 0.32, bw * 0.28, bh * 0.16, -0.2, 0, Math.PI * 2);
  ctx.fillStyle = bsG; ctx.fill();

  /* Belly */
  ctx.beginPath(); ctx.ellipse(0, bh * 0.12, bw * 0.55, bh * 0.55, 0, 0, Math.PI * 2);
  ctx.fillStyle = belly; ctx.fill();

  /* Front wing (right) */
  ctx.save(); ctx.globalAlpha = alpha * 0.85;
  ctx.beginPath();
  ctx.moveTo(bw * 0.35, -bh * 0.3);
  ctx.lineTo(bw + 18, -bh - 14);
  ctx.lineTo(bw + 8, -bh - 18);
  ctx.lineTo(bw * 0.15, -bh * 0.08);
  ctx.closePath(); ctx.fillStyle = wc; ctx.fill();
  ctx.restore();

  /* Feet */
  ctx.fillStyle = bc;
  ctx.beginPath(); ctx.ellipse(-bw * 0.45, bh + 2, 5, 3.5, -0.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(bw * 0.45, bh + 2, 5, 3.5, 0.2, 0, Math.PI * 2); ctx.fill();

  /* Head */
  ctx.save(); ctx.translate(0, hy); ctx.rotate(headTilt);
  ctx.beginPath(); ctx.arc(0, 0, hr, 0, Math.PI * 2);
  var hdG = ctx.createRadialGradient(-hr * 0.3, -hr * 0.35, hr * 0.06, hr * 0.06, hr * 0.06, hr * 1.15);
  hdG.addColorStop(0, dark ? '#ddd6fe' : '#c4b5fd');
  hdG.addColorStop(0.38, bc);
  hdG.addColorStop(1, dark ? '#6d28d9' : '#5b21b6');
  ctx.fillStyle = hdG; ctx.fill();
  /* Head specular */
  var hsG = ctx.createRadialGradient(-hr * 0.28, -hr * 0.33, 0, -hr * 0.28, -hr * 0.33, hr * 0.32);
  hsG.addColorStop(0, 'rgba(255,255,255,0.18)'); hsG.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath(); ctx.ellipse(-hr * 0.28, -hr * 0.33, hr * 0.26, hr * 0.16, -0.3, 0, Math.PI * 2);
  ctx.fillStyle = hsG; ctx.fill();

  /* Eyes */
  if (!isBlinking) {
    [-5, 5].forEach(function(ex) {
      var dir = ex < 0 ? 1 : -1;
      ctx.beginPath(); ctx.ellipse(ex, -1, 4.2, 5, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#fff'; ctx.fill();
      ctx.beginPath(); ctx.arc(ex + dir * 0.8, -0.5, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = ec; ctx.fill();
      ctx.beginPath(); ctx.arc(ex + dir * 1.5, -1.5, 0.9, 0, Math.PI * 2);
      ctx.fillStyle = '#fff'; ctx.fill();
    });
  } else {
    ctx.strokeStyle = ec; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(-8, 0); ctx.lineTo(-2, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(2, 0); ctx.lineTo(8, 0); ctx.stroke();
  }

  /* Horns */
  ctx.fillStyle = hc;
  [[-5, -hr + 2, -3, -hr - 8, -1, -hr + 2], [1, -hr + 2, 3, -hr - 8, 5, -hr + 2]].forEach(function(h) {
    ctx.beginPath(); ctx.moveTo(h[0], h[1]); ctx.lineTo(h[2], h[3]); ctx.lineTo(h[4], h[5]); ctx.closePath(); ctx.fill();
  });

  /* Smile */
  if (mood > 0.4) {
    ctx.beginPath(); ctx.arc(0, 3.5, 3.5, 0.15, Math.PI - 0.15);
    ctx.strokeStyle = dark ? '#6d28d9' : '#5b21b6'; ctx.lineWidth = 0.8; ctx.stroke();
  }

  /* Eggshell piece */
  if (DS.xp < 3000) {
    ctx.beginPath();
    ctx.moveTo(-9, -hr + 1); ctx.lineTo(-11, -hr - 5); ctx.lineTo(-6, -hr - 7);
    ctx.lineTo(-2, -hr - 3); ctx.lineTo(-5, -hr + 1); ctx.closePath();
    ctx.fillStyle = dark ? '#e8e4f8' : '#f5f3ff';
    ctx.strokeStyle = hc; ctx.lineWidth = 0.5;
    ctx.fill(); ctx.stroke();
  }

  ctx.restore(); /* head */
  ctx.restore(); /* main */
  ctx.globalAlpha = 1;
}

/* ГўВ”ВҖГўВ”ВҖ Stage particle pool (stages 2-5) ГўВ”ВҖГўВ”ВҖ */

for (var _stp = 0; _stp < 24; _stp++) {

}
var evolFlash = 0;

/* ГўВ”ВҖГўВ”ВҖ 3D shading helper ГўВ”ВҖГўВ”ВҖ */
function add3DShading(ctx, rx, ry) {
  var mx = Math.max(rx, ry) * 1.2;
  var g = ctx.createRadialGradient(-rx * 0.3, -ry * 0.35, rx * 0.06, rx * 0.1, ry * 0.1, mx);
  g.addColorStop(0, 'rgba(255,255,255,0.18)');
  g.addColorStop(0.4, 'rgba(255,255,255,0)');
  g.addColorStop(0.75, 'rgba(0,0,0,0)');
  g.addColorStop(1, 'rgba(0,0,0,0.12)');
  ctx.beginPath(); ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
  ctx.fillStyle = g; ctx.fill();
  var sg = ctx.createRadialGradient(-rx * 0.28, -ry * 0.32, 0, -rx * 0.28, -ry * 0.32, rx * 0.36);
  sg.addColorStop(0, 'rgba(255,255,255,0.22)'); sg.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath(); ctx.ellipse(-rx * 0.28, -ry * 0.32, rx * 0.28, ry * 0.18, -0.3, 0, Math.PI * 2);
  ctx.fillStyle = sg; ctx.fill();
}

/* ГўВ”ВҖГўВ”ВҖ Evolution ceremony ГўВ”ВҖГўВ”ВҖ */
var evolOv = document.getElementById('evolOv');
function showEvolution(stageIdx) {
  var si = STAGES[stageIdx];
  document.getElementById('evolName').textContent = si.name;
  document.getElementById('evolRank').textContent = si.rank;
  evolOv.classList.add('show');
  if (typeof playChime === 'function') { setTimeout(function() { playChime(); }, 500); }
  /* GSAP sub-element animations */
  if (typeof gsap !== 'undefined') {
    gsap.fromTo('#evolName', { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.7, delay: 0.4, ease: 'back.out(1.7)', clearProps: 'all' });
    gsap.fromTo('#evolRank', { y: 15, opacity: 0 }, { y: 0, opacity: 1, duration: 0.6, delay: 0.7, ease: 'power3.out', clearProps: 'all' });
    gsap.fromTo('.evol-xp-fill', { width: '0%' }, { width: '100%', duration: 1.2, delay: 0.9, ease: 'power2.inOut' });
  }
  /* Canvas-confetti celebration */
  if (typeof confetti !== 'undefined') {
    setTimeout(function() {
      confetti({ particleCount: 100, spread: 70, origin: { y: 0.45 }, colors: ['#8b5cf6', '#a78bfa', '#f59e0b', '#fbbf24', '#c4b5fd'] });
    }, 300);
    setTimeout(function() {
      confetti({ particleCount: 50, spread: 90, origin: { y: 0.55, x: 0.35 }, colors: ['#7c3aed', '#fbbf24'] });
      confetti({ particleCount: 50, spread: 90, origin: { y: 0.55, x: 0.65 }, colors: ['#7c3aed', '#fbbf24'] });
    }, 800);
  }

  ctx.beginPath(); ctx.arc(-14, -hr - 16, 1.5, 0, Math.PI * 2); ctx.fillStyle = 'rgba(' + gld + ',0.6)'; ctx.fill();

  /* Breath particles on exhale */

}

/* ГўВ”ВҖГўВ”ВҖ Stage 5: Elder (Maj, 150K XP) ГўВ”ВҖГўВ”ВҖ */
function drawElder(ctx, t) {
  var cx = DC, cy = DC + 2, avg = (DS.rations + DS.morale + DS.readiness) / 3;
  var mood = Math.max(0.4, avg / 100), br = 1 + Math.sin(t * 0.0012) * 0.012;
  var bob = Math.sin(t * 0.0007) * 0.5;
  blinkTimer += 16;
  if (!isBlinking && blinkTimer > blinkNext) { isBlinking = true; blinkTimer = 0; }
  if (isBlinking && blinkTimer > 80) { isBlinking = false; blinkTimer = 0; blinkNext = 4000 + Math.random() * 5000; }
  ctx.save(); ctx.translate(cx, cy + bob);
  var bc = dark ? '#7c3aed' : '#5b21b6', bly = dark ? '#8b5cf6' : '#7c3aed';
  var wc = dark ? '#4c1d95' : '#3b0764', hc = dark ? '#e9d5ff' : '#a78bfa';
  var gld = dark ? '251,191,36' : '217,119,6', acc = dark ? '167,139,250' : '109,40,217';
  var wht = dark ? '255,255,255' : '220,200,255';
  var bw = 24 * br, bh = 32, hr = 15, hy = -bh - hr + 3;
  /* Rotating energy arcs */
  var fRot = t * 0.0003;
  ctx.save(); ctx.rotate(fRot);
  for (var fi = 0; fi < 3; fi++) {
    var fA = fi * (Math.PI * 2 / 3), fP = 0.04 + 0.02 * Math.sin(t * 0.002 + fi);
    ctx.beginPath(); ctx.arc(0, 0, bh + 40, fA - 0.3, fA + 0.3);
    ctx.strokeStyle = 'rgba(' + acc + ',' + fP + ')'; ctx.lineWidth = 2; ctx.stroke();
  }
  ctx.restore();
  /* Aura */
  var ap = 0.08 + 0.04 * Math.sin(t * 0.0012);
  var ag = ctx.createRadialGradient(0, 0, bh * 0.5, 0, 0, bh + 45);
  ag.addColorStop(0, 'rgba(' + acc + ',' + (ap * 1.5) + ')'); ag.addColorStop(0.5, 'rgba(' + gld + ',' + (ap * 0.5) + ')');
  ag.addColorStop(1, 'rgba(' + acc + ',0)'); ctx.beginPath(); ctx.arc(0, 0, bh + 45, 0, Math.PI * 2); ctx.fillStyle = ag; ctx.fill();
  /* Ground circle + runes */
  var gp = 0.12 + 0.06 * Math.sin(t * 0.002);
  ctx.beginPath(); ctx.ellipse(0, bh + 12, 42, 9, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(' + acc + ',' + (gp * 0.4) + ')'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(0, bh + 12, 36, 7, 0, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(' + gld + ',' + (gp * 0.8) + ')'; ctx.lineWidth = 1; ctx.stroke();
  for (var ri = 0; ri < 6; ri++) {
    var rA = ri * (Math.PI / 3) + t * 0.0002;
    ctx.beginPath(); ctx.arc(Math.cos(rA) * 30, (bh + 12) + Math.sin(rA) * 5.5, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + gld + ',' + (gp * 0.7) + ')'; ctx.fill();
  }
  /* Shadow */
  ctx.beginPath(); ctx.ellipse(0, bh + 12, 34, 7, 0, 0, Math.PI * 2);
  ctx.fillStyle = dark ? 'rgba(0,0,0,0.25)' : 'rgba(0,0,0,0.1)'; ctx.fill();
  /* Energy-whip tail */
  ctx.beginPath(); ctx.moveTo(bw * 0.4, 0);
  ctx.bezierCurveTo(bw + 28, bh * 0.08, bw + 40, -10, bw + 32, -28);
  ctx.strokeStyle = bc; ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.stroke();
  var etf = Math.sin(t * 0.02) * 6;
  var etg = ctx.createRadialGradient(bw + 32, -30 + etf, 0, bw + 32, -30 + etf, 24);
  etg.addColorStop(0, 'rgba(255,255,240,0.5)'); etg.addColorStop(0.2, 'rgba(' + gld + ',0.4)');
  etg.addColorStop(0.5, 'rgba(' + acc + ',0.2)'); etg.addColorStop(1, 'rgba(' + acc + ',0)');
  ctx.beginPath(); ctx.arc(bw + 32, -30 + etf, 24, 0, Math.PI * 2); ctx.fillStyle = etg; ctx.fill();
  /* Massive back wing + glowing edge */
  ctx.beginPath(); ctx.moveTo(-bw * 0.2, -bh * 0.08);
  ctx.bezierCurveTo(-bw - 22, -bh * 0.45, -bw - 38, -bh - 32, -bw - 34, -bh - 40);
  ctx.lineTo(-bw - 20, -bh - 44); ctx.lineTo(-bw - 12, -bh - 34); ctx.lineTo(-bw * 0.01, -bh * 0.01);
  ctx.closePath(); ctx.fillStyle = wc; ctx.fill();
  ctx.beginPath(); ctx.moveTo(-bw * 0.2, -bh * 0.08);
  ctx.bezierCurveTo(-bw - 22, -bh * 0.45, -bw - 38, -bh - 32, -bw - 34, -bh - 40);
  ctx.strokeStyle = 'rgba(' + gld + ',' + (0.15 + 0.1 * Math.sin(t * 0.003)) + ')'; ctx.lineWidth = 1.5; ctx.stroke();
  /* Body */
  ctx.beginPath(); ctx.ellipse(0, 0, bw, bh, 0, 0, Math.PI * 2); ctx.fillStyle = bc; ctx.fill();
  add3DShading(ctx, bw, bh);
  /* 5 gold-trimmed armour plates */
  var oAl = 1;
  for (var pi = 0; pi < 5; pi++) {
    var py = -bh * 0.35 + pi * bh * 0.18, pw = bw * (0.38 - pi * 0.035);
    ctx.beginPath(); ctx.ellipse(0, py, pw, bh * 0.07, 0, 0, Math.PI * 2);
    ctx.globalAlpha = 0.35 + pi * 0.08; ctx.fillStyle = bly; ctx.fill();
    ctx.beginPath(); ctx.ellipse(0, py, pw, bh * 0.07, 0, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(' + gld + ',0.12)'; ctx.lineWidth = 0.5; ctx.stroke();
  }
  ctx.globalAlpha = 1;
  /* Energy core */
  var cp = 0.2 + 0.15 * Math.pow(Math.sin(t * 0.003), 2);
  var cG = ctx.createRadialGradient(0, -bh * 0.2, 0, 0, -bh * 0.2, bw * 0.35);
  cG.addColorStop(0, 'rgba(' + wht + ',' + (cp * 0.8) + ')'); cG.addColorStop(0.3, 'rgba(' + gld + ',' + (cp * 0.5) + ')');
  cG.addColorStop(0.6, 'rgba(' + acc + ',' + (cp * 0.2) + ')'); cG.addColorStop(1, 'rgba(' + acc + ',0)');
  ctx.beginPath(); ctx.arc(0, -bh * 0.2, bw * 0.35, 0, Math.PI * 2); ctx.fillStyle = cG; ctx.fill();
  ctx.beginPath(); ctx.arc(0, -bh * 0.2, 3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(' + wht + ',' + Math.min(1, cp * 1.2) + ')'; ctx.fill();
  /* 6 dorsal spines + glowing tips */
  for (var si = 0; si < 6; si++) {
    var sy = -bh * 0.75 + si * bh * 0.2, sx = -bw * 0.06 - si * 0.3, sH = 10 - si;
    ctx.beginPath(); ctx.moveTo(sx - 3, sy); ctx.lineTo(sx, sy - sH); ctx.lineTo(sx + 3, sy);
    ctx.closePath(); ctx.fillStyle = hc; ctx.fill();
    ctx.beginPath(); ctx.arc(sx, sy - sH, 1.2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + gld + ',0.4)'; ctx.fill();
  }
  /* Massive front wing + glowing edge */
  ctx.save(); ctx.globalAlpha = 0.7;
  ctx.beginPath(); ctx.moveTo(bw * 0.15, -bh * 0.12);
  ctx.bezierCurveTo(bw + 24, -bh * 0.48, bw + 40, -bh - 34, bw + 36, -bh - 42);
  ctx.lineTo(bw + 22, -bh - 46); ctx.lineTo(bw + 14, -bh - 36); ctx.lineTo(bw * 0.03, -bh * 0.02);
  ctx.closePath(); ctx.fillStyle = wc; ctx.fill();
  ctx.beginPath(); ctx.moveTo(bw * 0.15, -bh * 0.12);
  ctx.bezierCurveTo(bw + 24, -bh * 0.48, bw + 40, -bh - 34, bw + 36, -bh - 42);
  ctx.strokeStyle = 'rgba(' + gld + ',' + (0.15 + 0.1 * Math.sin(t * 0.003 + 1)) + ')'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.restore();
  /* Legs */
  ctx.fillStyle = bc;
  [-0.32, 0.32].forEach(function(xf) {
    ctx.beginPath(); ctx.ellipse(bw * xf, bh + 5, 9, 5.5, xf * 0.2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = hc;
    for (var ci = -1; ci <= 1; ci++) {
      var clx = bw * xf + ci * 4;
      ctx.beginPath(); ctx.moveTo(clx, bh + 9); ctx.lineTo(clx - 0.5, bh + 15); ctx.lineTo(clx + 1, bh + 9); ctx.fill();
    }
    ctx.fillStyle = bc;
  });
  /* Scar marks */
  ctx.strokeStyle = dark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)'; ctx.lineWidth = 0.8; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-bw * 0.3, -bh * 0.1); ctx.lineTo(-bw * 0.1, bh * 0.05); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bw * 0.15, bh * 0.1); ctx.lineTo(bw * 0.35, bh * 0.25); ctx.stroke();
  /* Head */
  ctx.save(); ctx.translate(0, hy);
  ctx.beginPath(); ctx.ellipse(0, 0, hr + 3, hr, 0, 0, Math.PI * 2); ctx.fillStyle = bc; ctx.fill();
  /* GLOWING EYES - pure energy, no pupils */
  if (!isBlinking) {
    [-6, 6].forEach(function(ex) {
      var eG = ctx.createRadialGradient(ex, -1, 0, ex, -1, 8);
      eG.addColorStop(0, 'rgba(' + gld + ',0.25)'); eG.addColorStop(0.5, 'rgba(' + gld + ',0.08)'); eG.addColorStop(1, 'rgba(' + gld + ',0)');
      ctx.beginPath(); ctx.arc(ex, -1, 8, 0, Math.PI * 2); ctx.fillStyle = eG; ctx.fill();
      ctx.beginPath(); ctx.ellipse(ex, -1, 3.5, 3.5, 0, 0, Math.PI * 2);
      var eyeG = ctx.createRadialGradient(ex, -1, 0, ex, -1, 3.5);
      eyeG.addColorStop(0, 'rgba(255,255,240,0.9)'); eyeG.addColorStop(0.5, 'rgba(' + gld + ',0.7)'); eyeG.addColorStop(1, 'rgba(' + acc + ',0.3)');
      ctx.fillStyle = eyeG; ctx.fill();
    });
  } else {
    ctx.strokeStyle = 'rgba(' + gld + ',0.5)'; ctx.lineWidth = 2; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(-9, 0); ctx.lineTo(-3, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(3, 0); ctx.lineTo(9, 0); ctx.stroke();
  }
  /* 5-horn crown crest with gold-tipped glow */
  ctx.lineWidth = 3; ctx.lineCap = 'round';
  var crA = [-0.6, -0.3, 0, 0.3, 0.6], crL = [12, 16, 20, 16, 12];
  crA.forEach(function(ca, ci) {
    var hx = Math.sin(ca) * (hr - 2), hy2 = -hr + 3;
    var tx = hx + Math.sin(ca) * crL[ci], ty = hy2 - crL[ci] * Math.cos(ca * 0.5);
    ctx.strokeStyle = hc; ctx.beginPath(); ctx.moveTo(hx, hy2); ctx.lineTo(tx, ty); ctx.stroke();

    ctx.beginPath(); ctx.arc(tx, ty, 4, 0, Math.PI * 2); ctx.fillStyle = tipG; ctx.fill();
  });
  ctx.restore(); ctx.restore();
  /* 18 ambient particles (gold / purple / white mix) */
  for (var api = 0; api < 18; api++) {
    var sp = stageParts[api]; sp.a += sp.sp * (1 + 0.3 * Math.sin(t * 0.0005));
    var pD = sp.d * 0.75 + Math.sin(t * 0.0008 + sp.ph) * 8;
    var px = cx + Math.cos(sp.a) * pD;
    var py = cy + bob + Math.sin(sp.a) * pD * 0.55 + Math.sin(t * 0.001 + sp.ph) * 14;
    var pAl = (0.12 + 0.22 * Math.sin(t * 0.003 + sp.ph)) * mood;
    var pCol = api % 7 === 0 ? wht : api % 4 === 0 ? gld : acc;
    var pg = ctx.createRadialGradient(px, py, 0, px, py, sp.r * 3.5);
    pg.addColorStop(0, 'rgba(' + pCol + ',' + pAl + ')'); pg.addColorStop(1, 'rgba(' + pCol + ',0)');
    ctx.beginPath(); ctx.arc(px, py, sp.r * 3.5, 0, Math.PI * 2); ctx.fillStyle = pg; ctx.fill();
    ctx.beginPath(); ctx.arc(px, py, sp.r * 0.8, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + pCol + ',' + Math.min(1, pAl * 1.5) + ')'; ctx.fill();
  }
}

/* Weather canvas FX ГўВҖВ” uses weatherData from fetchWeather(); egg stage adds richer ambient in drawEgg() */
var wxDrops = [];
for (var _wi = 0; _wi < 25; _wi++) {
  wxDrops.push({ x: Math.random(), y: Math.random(), sp: 0.4 + Math.random() * 1.2, sz: 0.8 + Math.random() * 1.5 });
}

function drawWeatherFX(ctx, t) {
  if (!weatherData) return;
  var wt = weatherData.type;
  if (!wt || wt === 'clear' || wt === 'cloudy') return;
  ctx.save();
  if (wt === 'rain' || wt === 'storm') {
    for (var i = 0; i < 18; i++) {
      var d = wxDrops[i]; d.y += d.sp * 0.014; d.x += 0.002;
      if (d.y > 1.05) { d.y = -0.05; d.x = Math.random(); }
      var rx = d.x * DSZ, ry = d.y * DSZ;
      ctx.beginPath(); ctx.moveTo(rx, ry); ctx.lineTo(rx + 1.5, ry + d.sz * 4);
      ctx.strokeStyle = dark ? 'rgba(167,139,250,0.12)' : 'rgba(100,120,200,0.1)';
      ctx.lineWidth = 0.7; ctx.stroke();
    }
  }
  if (wt === 'snow') {
    for (var j = 0; j < 12; j++) {
      var s = wxDrops[j]; s.y += s.sp * 0.005;
      s.x += Math.sin(t * 0.0008 + j * 0.7) * 0.0015;
      if (s.y > 1.05) { s.y = -0.05; s.x = Math.random(); }
      ctx.beginPath(); ctx.arc(s.x * DSZ, s.y * DSZ, s.sz * 0.7, 0, Math.PI * 2);
      ctx.fillStyle = dark ? 'rgba(220,220,255,0.18)' : 'rgba(180,180,220,0.22)'; ctx.fill();
    }
  }
  if (wt === 'storm' && Math.random() > 0.996) {
    ctx.fillStyle = 'rgba(255,255,255,0.12)'; ctx.fillRect(0, 0, DSZ, DSZ);
  }
  if (wt === 'fog') {
    var fa = 0.035 + 0.02 * Math.sin(t * 0.0004);
    var fg = ctx.createRadialGradient(DC, DC, 20, DC, DC, DSZ * 0.6);
    fg.addColorStop(0, 'rgba(0,0,0,0)');
    fg.addColorStop(1, dark ? 'rgba(80,60,120,' + fa + ')' : 'rgba(180,180,200,' + fa + ')');
    ctx.fillStyle = fg; ctx.fillRect(0, 0, DSZ, DSZ);
  }
  ctx.restore();
}

/* ГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•Вҗ
   GSAP + CONFETTI OVERRIDES
   ГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•Вҗ */
setTimeout(function() {
  /* Smooth XP float with GSAP */
  if (typeof gsap !== 'undefined' && typeof showXPFloat === 'function') {
    var _oxp = showXPFloat;
    showXPFloat = function(text) {

}, 0);

function drawDragon(t) {
  var s = getStage(DS.xp);
  if (!(s === 0 && useThreeEgg)) {
    dctx.clearRect(0, 0, DSZ, DSZ);
  }
  drawAmbientBG(dctx, t);
  drawWeatherFX(dctx, t);
  checkActivity(t);
  if (curAct && (curAct.id === 'sleep' || curAct.id === 'dream' || curAct.id === 'astral')) {
    isBlinking = true; blinkTimer = 0;
  }
  if (s === 0) {
    if (useThreeEgg) EggScene.render(t, DS);
    else drawEgg(dctx, t);
  } else if (s === 1) drawHatchling(dctx, t);
  else if (s === 2) drawFledgling(dctx, t);
  else if (s === 3) drawJuvenile(dctx, t);
  else if (s === 4) drawAdult(dctx, t);
  else drawElder(dctx, t);
  /* Activity overlays */
  drawActivityOverlays(dctx, t);
  /* Evolution flash overlay */
  if (evolFlash > 0) {
    dctx.fillStyle = 'rgba(255,255,240,' + (evolFlash * 0.35) + ')';
    dctx.fillRect(0, 0, DSZ, DSZ);
    evolFlash = Math.max(0, evolFlash - 0.025);
  }
}

/* ГўВ”ВҖГўВ”ВҖ Activity overlay drawing ГўВ”ВҖГўВ”ВҖ */
function drawActivityOverlays(ctx, t) {
  if (!curAct || actFade < 0.01) return;
  var isSleep = curAct.id === 'sleep' || curAct.id === 'dream' || curAct.id === 'astral';

  /* Floating Z's for sleep states */
  if (isSleep) {
    if (t - lastZSpawn > 850 && sleepZs.length < 6) {
      sleepZs.push({ x: DC + 14 + Math.random() * 8, y: DC - 30, born: t, sz: 7 + Math.random() * 5 });
      lastZSpawn = t;
    }
    for (var i = sleepZs.length - 1; i >= 0; i--) {
      var z = sleepZs[i], age = t - z.born;
      if (age > 3200) { sleepZs.splice(i, 1); continue; }
      z.x += Math.sin(age * 0.0018) * 0.25;
      z.y -= 0.38;
      var za = age < 400 ? age / 400 : age > 2700 ? 1 - (age - 2700) / 500 : 1;
      za *= actFade * 0.6;
      var zsc = 0.7 + (age / 3200) * 0.6;
      ctx.font = 'bold ' + Math.round(z.sz * zsc) + 'px Inter';
      ctx.fillStyle = 'rgba(' + (dark ? '167,139,250' : '139,92,246') + ',' + za + ')';
      ctx.textAlign = 'center';
      ctx.fillText('z', z.x, z.y);
    }
    ctx.textAlign = 'start';
  } else {
    sleepZs = []; lastZSpawn = 0;
  }

  /* Thought bubble for active (non-sleep) activities */
  if (curAct.icon && !isSleep) {
    var bx = DC + 28, by = DC - 46 + Math.sin(t * 0.0015) * 2;
    var al = actFade * 0.85;
    var bgc = dark ? '35,30,50' : '255,255,255';
    var brc = '138,92,246';

    /* Trail dots */
    ctx.beginPath(); ctx.arc(DC + 10, DC - 20, 2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + bgc + ',' + (al * 0.7) + ')'; ctx.fill();
    ctx.strokeStyle = 'rgba(' + brc + ',' + (al * 0.2) + ')'; ctx.lineWidth = 0.7; ctx.stroke();
    ctx.beginPath(); ctx.arc(DC + 17, DC - 30, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + bgc + ',' + (al * 0.8) + ')'; ctx.fill(); ctx.stroke();

    /* Bubble */
    ctx.beginPath(); ctx.ellipse(bx, by, 16, 14, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + bgc + ',' + (al * 0.9) + ')'; ctx.fill();
    ctx.strokeStyle = 'rgba(' + brc + ',' + (al * 0.25) + ')'; ctx.lineWidth = 1; ctx.stroke();

    /* Icon */
    ctx.globalAlpha = al;
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(curAct.icon, bx, by);
    ctx.globalAlpha = 1;
    ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
  }
}

function updateBars() {
  [['rations','Rations','Hunger'],['morale','Morale','Spirit'],['readiness','Readiness','Energy']].forEach(function(b) {
    var val = Math.max(0, DS[b[0]]);
    var fill = document.getElementById('bar' + b[1]);
    fill.style.width = val + '%';
    fill.setAttribute('data-pct', Math.round(val) + '%');
    fill.classList.remove('warn', 'crit');
    if (val < 10) fill.classList.add('crit');
    else if (val < 30) fill.classList.add('warn');
    document.getElementById('val' + b[1]).textContent = Math.round(val);
    var track = fill.parentNode;
    if (track) track.setAttribute('aria-label', b[2] + ': ' + Math.round(val) + '%');
  });
}

function updateStatus() {
  var stage = getStage(DS.xp);
  var si = STAGES[stage];
  var nxt = stage < STAGES.length - 1 ? STAGES[stage + 1].xp : null;
  var dp = getDayPhase();
  var fSz = DS.streak >= 30 ? '1.3' : DS.streak >= 14 ? '1.15' : DS.streak >= 7 ? '1.05' : '0.85';
  var fOp = Math.min(1, 0.35 + DS.streak * 0.05);
  document.getElementById('dStatus').innerHTML =
    'Thymos &middot; <span class="d-rank">' + si.rank + '</span> &middot; ' +
    Math.floor(DS.xp).toLocaleString() + ' XP &middot; ' +
    'Streak: ' + DS.streak + 'd <span class="s-flame" style="font-size:' + fSz + 'em;opacity:' + fOp + '">&#x1F525;</span>' +
    (dp.label ? ' ' + dp.label : '');
  var pf = document.getElementById('xpProgFill');
  var pl = document.getElementById('xpProgLabel');
  if (pf && pl) {
    if (nxt !== null) {
      var prev = STAGES[stage].xp;
      var pct = Math.min(100, ((DS.xp - prev) / (nxt - prev)) * 100);
      pf.style.width = pct + '%';
      if (Core && typeof Core.smoothCounter === 'function') {
        Core.smoothCounter(pl, Math.floor(DS.xp), {
          duration: 0.45,
          decimals: 0,
          suffix: ' / ' + nxt.toLocaleString()
        });
      } else {
        pl.textContent = Math.floor(DS.xp).toLocaleString() + ' / ' + nxt.toLocaleString();
      }
    } else {
      pf.style.width = '100%';
      pl.textContent = 'MAX RANK';
    }
  }
}

/* Scaled XP: milestone reward = percentage of current evolution gap */
function scaledMilestoneXP(catId) {
  var cat = DEFAULT_CATEGORIES.find(function(c) { return c.id === catId; });
  if (!cat) return 100;
  var stage = getStage(DS.xp);
  var cur = STAGES[stage].xp;
  var nxt = stage < STAGES.length - 1 ? STAGES[stage + 1].xp : STAGES[stage].xp;
  var gap = nxt - cur;
  if (gap <= 0) return Math.round(cat.pct * 60000);
  return Math.round(cat.pct * gap);
}

/* Map old 6-category IDs to new 3-tier system */
function migrateCategoryId(catId) {
  if (catId === 'small' || catId === 'medium' || catId === 'large') return catId;
  return 'medium';
}

function genMilestoneId() {
  return 'ms_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 5);
}

function loadMilestones() {
  try {
    var synced = SyncEngine.get('dragon', 'milestones');
    if (synced != null && synced !== undefined && synced !== '') {
      if (typeof synced === 'string') synced = JSON.parse(synced);
      if (Array.isArray(synced) && synced.length > 0) return synced;
    }
  } catch (e) {}
  try {
    var local = JSON.parse(localStorage.getItem(MILESTONE_STORAGE_KEY));
    if (Array.isArray(local)) return local;
  } catch (e2) {}
  return [];
}

function saveMilestones(list) {
  localStorage.setItem(MILESTONE_STORAGE_KEY, JSON.stringify(list));
  try {
    if (SyncEngine.isOnline()) {
      SyncEngine.set('dragon', 'milestones', JSON.stringify(list));
    }
  } catch (e) {}
}

function loadArchive() {
  try {
    var synced = SyncEngine.get('dragon', 'milestones_archive');
    if (synced != null && synced !== undefined && synced !== '') {
      if (typeof synced === 'string') synced = JSON.parse(synced);
      if (Array.isArray(synced) && synced.length > 0) return synced;
    }
  } catch (e) {}
  try {
    var local = JSON.parse(localStorage.getItem(MILESTONE_ARCHIVE_KEY));
    if (Array.isArray(local)) return local;
  } catch (e2) {}
  return [];
}

function saveArchive(list) {
  localStorage.setItem(MILESTONE_ARCHIVE_KEY, JSON.stringify(list));
  try {
    if (SyncEngine.isOnline()) {
      SyncEngine.set('dragon', 'milestones_archive', JSON.stringify(list));
    }
  } catch (e) {}
}

function archiveMilestone(ms) {
  var archive = loadArchive();
  ms.archivedAt = new Date().toISOString();
  archive.unshift(ms);
  saveArchive(archive);
}

function processExpiredMilestones() {
  var milestones = loadMilestones();
  var now = new Date();
  now.setHours(0, 0, 0, 0);
  var changed = false;
  milestones = milestones.filter(function(ms) {
    var msDate = new Date(ms.date + 'T00:00:00');
    msDate.setHours(0, 0, 0, 0);
    var daysPast = Math.floor((now - msDate) / 86400000);
    /* Auto-archive only if >30 days past due and unclaimed (cleanup safety net) */
    if (daysPast > 30) {
      archiveMilestone(ms);
      changed = true;
      return false;
    }
    return true;
  });
  if (changed) saveMilestones(milestones);
  return milestones;
}

function unlockAch(id) {
  if (achData[id]) return false;
  achData[id] = Date.now();
  localStorage.setItem('dragon_ach', JSON.stringify(achData));
  var a = ACHS.find(function(x) { return x.id === id; });
  if (a) showXPFloat('\uD83C\uDFC6 ' + a.name);
  renderAch();
  return true;
}

function checkAch() {
  if (DS.rations < 20 && DS.morale < 20 && DS.readiness < 20) allBarsBelowFlag = true;
  if (DS.xp > 0) unlockAch('first_steps');
  if (DS.xp >= 1000) unlockAch('xp_1k');
  if (DS.xp >= 10000) unlockAch('xp_10k');
  if (DS.xp >= 50000) unlockAch('xp_50k');
  if (DS.xp >= 100000) unlockAch('xp_100k');
  var stg = getStage(DS.xp);
  if (stg >= 1) unlockAch('hatched');
  if (stg >= 2) unlockAch('taking_flight');
  if (stg >= 3) unlockAch('battle_tested');
  if (stg >= 4) unlockAch('officer');
  if (stg >= 5) unlockAch('elder');
  if (DS.streak >= 7) unlockAch('streak_7');
  if (DS.streak >= 14) unlockAch('streak_14');
  if (DS.streak >= 30) unlockAch('streak_30');
  if (DS.streak >= 100) unlockAch('streak_100');
  if (DS.rations >= 100 && DS.morale >= 100 && DS.readiness >= 100) unlockAch('all_full');
  if (DS.feedToday > 0 && DS.playToday > 0 && DS.restToday > 0) unlockAch('caretaker');
  var h = new Date().getHours();
  if (h >= 0 && h < 5) unlockAch('night_owl');
  if (h >= 5 && h < 7) unlockAch('early_bird');
  if (allBarsBelowFlag && DS.rations >= 50 && DS.morale >= 50 && DS.readiness >= 50) unlockAch('resilient');
  if (achVisits >= 50) unlockAch('dedicated');
  if (curAct && (curAct.id === 'meditate' || curAct.id === 'astral')) unlockAch('zen');
  if (DS.lastRandom === todayStr()) unlockAch('lucky');

  if (userMilestones.length >= 1) unlockAch('milestone_1');
  if (userMilestones.length >= 5) unlockAch('milestone_5');
  var archiveLen = loadArchive().length;
  if (archiveLen >= 1) unlockAch('milestone_done_1');
  if (archiveLen >= 5) unlockAch('milestone_done_5');
  if (archiveLen >= 10) unlockAch('milestone_done_10');

  if (weatherData) {
    if (weatherData.type === 'clear') unlockAch('weather_clear');
    if (weatherData.type === 'storm') unlockAch('weather_storm');
    if (weatherData.type === 'snow') unlockAch('weather_snow');
  }

  if (DS.streak >= 365) unlockAch('streak_365');
  if (DS.xp >= 120000) unlockAch('xp_max');

  var dow = new Date().getDay();
  if (dow === 0 || dow === 6) {
    var wwKey = 'dragon_weekend_' + todayStr().substring(0, 7);
    var wwData = {};
    try { wwData = JSON.parse(localStorage.getItem(wwKey) || '{}'); } catch (e) { wwData = {}; }
    wwData[String(dow)] = true;
    localStorage.setItem(wwKey, JSON.stringify(wwData));
    if (wwData['0'] && wwData['6']) unlockAch('weekend');
  }

  if (DS.rations <= 0 || DS.morale <= 0 || DS.readiness <= 0) unlockAch('bar_zero');

  if (getStage(DS.xp) >= 1) {
    var firstVisit = localStorage.getItem('dragon_first_visit');
    if (!firstVisit) { localStorage.setItem('dragon_first_visit', todayStr()); }
    else {
      var daysSinceFirst = Math.floor((new Date() - new Date(firstVisit + 'T00:00:00')) / 86400000);
      if (daysSinceFirst <= 30) unlockAch('speed_evolve');
    }
  } else if (!localStorage.getItem('dragon_first_visit')) {
    localStorage.setItem('dragon_first_visit', todayStr());
  }

  var totalAch = ACHS.length;
  var unlockedCount = Object.keys(achData).length;
  if (unlockedCount >= totalAch - 1) unlockAch('all_ach');
}

/* ГўВ•ВҗГўВ•ВҗГўВ•Вҗ AMBIENT BACKGROUND + SEASONAL ГўВ•ВҗГўВ•ВҗГўВ•Вҗ */

var ambStars = [];
for (var _as = 0; _as < 20; _as++) {
  ambStars.push({x:Math.random()*DSZ, y:Math.random()*DSZ, r:0.3+Math.random()*0.8, ph:Math.random()*Math.PI*2});
}
var seasonParts = [];

function getSeasonType() {
  var m = new Date().getMonth();
  if (m >= 11 || m <= 1) return 'winter';
  if (m >= 2 && m <= 4) return 'spring';
  if (m >= 5 && m <= 7) return 'summer';
  return 'autumn';
}

function drawAmbientBG(ctx, t) {
  var dp = getDayPhase();
  if (dp.phase === 'night') {
    for (var i = 0; i < ambStars.length; i++) {
      var s = ambStars[i];
      var tw = 0.15 + 0.25 * Math.sin(t * 0.001 + s.ph);
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(' + (dark ? '200,180,255' : '139,92,246') + ',' + tw + ')';
      ctx.fill();
    }
  }
  if (dp.phase === 'evening') {
    var eg = ctx.createRadialGradient(DC, DSZ, 0, DC, DSZ, DSZ);
    eg.addColorStop(0, 'rgba(245,158,11,0.03)');
    eg.addColorStop(1, 'rgba(245,158,11,0)');
    ctx.fillStyle = eg; ctx.fillRect(0, 0, DSZ, DSZ);
  }
  var season = getSeasonType();
  if (season === 'winter') {
    if (seasonParts.length < 12) seasonParts.push({x:Math.random()*DSZ,y:-5,r:0.5+Math.random(),sp:0.2+Math.random()*0.3,drift:Math.random()*0.5-0.25});
    for (var si = seasonParts.length - 1; si >= 0; si--) {
      var sp = seasonParts[si]; sp.y += sp.sp; sp.x += sp.drift + Math.sin(t*0.001+si)*0.15;
      if (sp.y > DSZ+5) { sp.y = -5; sp.x = Math.random()*DSZ; }
      ctx.beginPath(); ctx.arc(sp.x, sp.y, sp.r, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,' + (dark?0.15:0.1) + ')'; ctx.fill();
    }
  } else if (season === 'spring') {
    if (seasonParts.length < 8) seasonParts.push({x:Math.random()*DSZ,y:-5,r:1+Math.random()*1.5,sp:0.15+Math.random()*0.25,drift:0.1+Math.random()*0.3,rot:Math.random()*Math.PI*2});
    for (var pi = seasonParts.length - 1; pi >= 0; pi--) {
      var p = seasonParts[pi]; p.y += p.sp; p.x += p.drift + Math.sin(t*0.0008+pi)*0.3; p.rot += 0.01;
      if (p.y > DSZ+5) { p.y = -5; p.x = Math.random()*DSZ; }
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.beginPath(); ctx.ellipse(0, 0, p.r, p.r*0.6, 0, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,183,197,' + (dark?0.18:0.15) + ')'; ctx.fill(); ctx.restore();
    }
  } else if (season === 'autumn') {
    if (seasonParts.length < 6) seasonParts.push({x:Math.random()*DSZ,y:-5,r:1.5+Math.random(),sp:0.18+Math.random()*0.2,drift:0.2+Math.random()*0.4,rot:Math.random()*Math.PI*2});
    for (var li = seasonParts.length - 1; li >= 0; li--) {
      var l = seasonParts[li]; l.y += l.sp; l.x += l.drift + Math.sin(t*0.0006+li)*0.4; l.rot += 0.008;
      if (l.y > DSZ+5) { l.y = -5; l.x = Math.random()*DSZ; }
      ctx.save(); ctx.translate(l.x, l.y); ctx.rotate(l.rot);
      ctx.beginPath(); ctx.ellipse(0, 0, l.r, l.r*0.5, 0, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(217,119,6,' + (dark?0.15:0.12) + ')'; ctx.fill(); ctx.restore();
    }
  }
}

var radialOv = document.getElementById('radialOv');

function openRadial() {
  var cd = timeToMidnight();
  var now = new Date();
  var midnight = new Date(now); midnight.setHours(24, 0, 0, 0);
  var remainingPct = Math.max(0, Math.min(100, ((midnight - now) / 86400000) * 100));
  /* Update button states + cooldown countdown */
  var caps = { Feed: 'feedToday', Play: 'playToday', Rest: 'restToday' };
  Object.keys(caps).forEach(function(id) {
    var btn = document.getElementById('btn' + id);
    var isMaxed = DS[caps[id]] >= INTERACT_CAP;
    btn.classList.toggle('maxed', isMaxed);
    btn.style.setProperty('--cd-progress', remainingPct);
    var cdEl = btn.querySelector('.rad-cd');
    if (isMaxed) {
      if (!cdEl) { cdEl = document.createElement('span'); cdEl.className = 'rad-cd'; btn.appendChild(cdEl); }
      cdEl.textContent = cd;
      btn.setAttribute('aria-label', btn.textContent.trim() + ', cooldown ' + cd);
    } else if (cdEl) { cdEl.remove(); }
    else btn.setAttribute('aria-label', btn.textContent.trim());
  });
  radialOv.classList.add('show');
  if (typeof playClick === 'function') playClick();
  Core.a11y.roving(radialOv, '.rad-btn');
}

function closeRadial() { radialOv.classList.remove('show'); }

/* Dragon canvas tap */

radialOv.addEventListener('click', function(e) {
  if (e.target === radialOv) { closeRadial(); return; }
  var btn = e.target.closest('.rad-btn');
  if (!btn || btn.classList.contains('maxed')) return;
  var act = btn.dataset.act;
  if (act === 'feed' && DS.feedToday < INTERACT_CAP) {
    DS.rations = Math.min(100, DS.rations + 40); DS.feedToday++;
    if (typeof playOpen === 'function') playOpen();
  } else if (act === 'play' && DS.playToday < INTERACT_CAP) {
    DS.morale = Math.min(100, DS.morale + 35); DS.playToday++;
    if (typeof playStart === 'function') playStart();
  } else if (act === 'rest' && DS.restToday < INTERACT_CAP) {
    DS.readiness = Math.min(100, DS.readiness + 30); DS.restToday++;
    if (typeof playOpen === 'function') playOpen();
  } else { return; }
  Core.ripple(btn);
  var wantBonus = (wantActive === act) ? WANT_BONUS : 0;
  if (wantActive === act) { wantActive = null; wantBubble.classList.remove('show'); }
  addXP(INTERACT_XP + wantBonus);
  if (wantBonus) showXPFloat('+' + wantBonus + ' bonus!');
  saveDS(DS);
  updateBars();
  updateStatus();
  closeRadial();
});

function checkWant(t) {
  if (wantActive) {
    if (t - wantStart > WANT_DURATION) { wantActive = null; wantBubble.classList.remove('show'); }
    return;
  }
  if (t - lastWantCheck < WANT_INTERVAL) return;
  lastWantCheck = t;
  if (Math.random() < 0.3) {
    var avail = ['feed','play','rest'].filter(function(w) { return DS[w + 'Today'] < INTERACT_CAP; });
    if (avail.length) {
      wantActive = avail[Math.floor(Math.random() * avail.length)];
      wantStart = t;
      wantBubble.textContent = WANTS_ICONS[wantActive];
      wantBubble.classList.add('show');
    }
  }
}

function switchTab(tab) {
  if (tab === activeTab) return;
  var order = ['dragon', 'radar', 'ach'];
  var dir = order.indexOf(tab) > order.indexOf(activeTab) ? 'forward' : 'backward';
  var oldEl = activeTab === 'dragon' ? vDragon : activeTab === 'radar' ? vRadar : vAch;
  var newEl = tab === 'dragon' ? vDragon : tab === 'radar' ? vRadar : vAch;
  oldEl.classList.add('exiting-' + dir);
  newEl.classList.remove('active');
  newEl.classList.add('entering-' + dir);
  activeTab = tab;
  tabDragon.classList.toggle('active', tab === 'dragon');
  tabRadar.classList.toggle('active', tab === 'radar');
  tabAch.classList.toggle('active', tab === 'ach');
  tabDragon.setAttribute('aria-selected', tab === 'dragon' ? 'true' : 'false');
  tabRadar.setAttribute('aria-selected', tab === 'radar' ? 'true' : 'false');
  tabAch.setAttribute('aria-selected', tab === 'ach' ? 'true' : 'false');
  setTimeout(function() {
    vDragon.classList.toggle('active', tab === 'dragon');
    vRadar.classList.toggle('active', tab === 'radar');
    vAch.classList.toggle('active', tab === 'ach');
    oldEl.classList.remove('exiting-forward', 'exiting-backward');
    newEl.classList.remove('entering-forward', 'entering-backward');
  }, 200);
  if (typeof playModeSwitch === 'function') playModeSwitch();
}

function daysTo(ds) {
  var t = new Date(ds + 'T00:00:00'), n = new Date();

function hexRgba(h, a) {

}
function hashStr(s) {
  var h = 0;
  for (var i = 0; i < s.length; i++) h = ((h << 5) - h) + s.charCodeAt(i);
  return h;
}

}
function getCatName(catId) {
  var cat = DEFAULT_CATEGORIES.find(function(c) { return c.id === catId; });
  return cat ? cat.name : catId;
}

function buildItems() {
  return userMilestones.map(function(ms) {
    var safeCat = migrateCategoryId(ms.cat);
    return {
      id: ms.id, n: ms.name, d: ms.date, c: getCatColor(safeCat),
      cat: getCatName(safeCat), catId: safeCat, days: daysTo(ms.date),
      w: ms.weight || 1, icon: ms.icon || getCatIcon(safeCat),
      xp: scaledMilestoneXP(safeCat), desc: ms.desc || ''
    };
  }).filter(function(m) { return m.days >= -30; }).sort(function(a, b) { return a.days - b.days; });
}

var items = buildItems();
var catList = [];
items.forEach(function(m) { if (catList.indexOf(m.cat) === -1) catList.push(m.cat); });
var sectorSize = (Math.PI * 2) / Math.max(catList.length, 1);
function catSectorAngle(cat, seed) {
  var idx = catList.indexOf(cat);
  var base = idx * sectorSize + sectorSize * 0.1;
  var spread = (Math.abs(seed) % 1000) / 1000;
  return base + spread * sectorSize * 0.8;
}

function getThreatLevel() {
  var n = 0;
  items.forEach(function(m) { if (m.days <= 7 && m.days >= 0) n++; });
  return Math.min(n / 3, 1);
}

/* ГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•Вҗ
   8. RADAR CANVAS (existing)
   ГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•Вҗ */

var cv = document.getElementById('r');
var ctx = cv.getContext('2d');
var SZ = 200;
cv.width = SZ * DPR; cv.height = SZ * DPR;
cv.style.width = SZ + 'px'; cv.style.height = SZ + 'px';
ctx.scale(DPR, DPR);

var C = SZ / 2, MR = C - 10;
var echoes = [], pings = [], bursts = [];
var ENTRY_DUR = 1200;
var loadTime = -1;
var lastPingTime = 0;

var blips = [];

var staticCv = document.createElement('canvas');
function rebuildRadarStatic() {
  staticCv.width = SZ * DPR;
  staticCv.height = SZ * DPR;
  var sCtx = staticCv.getContext('2d');
  sCtx.setTransform(1, 0, 0, 1, 0, 0);
  sCtx.scale(DPR, DPR);
  sCtx.strokeStyle = dark ? 'rgba(138,92,246,0.06)' : 'rgba(138,92,246,0.04)';
  sCtx.lineWidth = 0.5;
  sCtx.beginPath();
  sCtx.moveTo(C, C - MR - 2); sCtx.lineTo(C, C + MR + 2);
  sCtx.moveTo(C - MR - 2, C); sCtx.lineTo(C + MR + 2, C);
  var dd = (MR + 2) * 0.707;
  sCtx.moveTo(C - dd, C - dd); sCtx.lineTo(C + dd, C + dd);
  sCtx.moveTo(C + dd, C - dd); sCtx.lineTo(C - dd, C + dd);
  sCtx.stroke();
  RINGS.forEach(function(days, i) {
    var r = (days / MAX_DAYS) * MR;
    sCtx.beginPath(); sCtx.arc(C, C, r, 0, Math.PI * 2);
    sCtx.strokeStyle = dark ? 'rgba(138,92,246,0.10)' : 'rgba(138,92,246,0.07)';
    sCtx.lineWidth = 0.7; sCtx.stroke();
    sCtx.font = '500 6.5px Inter';
    sCtx.fillStyle = dark ? 'rgba(167,139,250,0.28)' : 'rgba(138,92,246,0.22)';
    sCtx.textAlign = 'left';
    sCtx.fillText(RLBL[i], C + 2, C - r - 3);
  });
  sCtx.beginPath(); sCtx.arc(C, C, MR + 1, 0, Math.PI * 2);
  sCtx.strokeStyle = dark ? 'rgba(138,92,246,0.12)' : 'rgba(138,92,246,0.08)';
  sCtx.lineWidth = 0.8; sCtx.stroke();
  for (var si = 0; si < catList.length; si++) {
    var sa = si * sectorSize;
    sCtx.beginPath(); sCtx.moveTo(C, C);
    sCtx.lineTo(C + Math.cos(sa) * (MR + 1), C + Math.sin(sa) * (MR + 1));
    sCtx.strokeStyle = dark ? 'rgba(138,92,246,0.05)' : 'rgba(138,92,246,0.035)';
    sCtx.lineWidth = 0.5; sCtx.stroke();
  }
  sCtx.font = '500 5.5px Inter';
  catList.forEach(function(cat, i) {
    var midAngle = i * sectorSize + sectorSize / 2;
    var lr = MR * 0.52;
    var lx = C + Math.cos(midAngle) * lr;
    var ly = C + Math.sin(midAngle) * lr;
    sCtx.save(); sCtx.translate(lx, ly);
    var rot = midAngle;
    if (rot > Math.PI / 2 && rot < Math.PI * 1.5) rot += Math.PI;
    sCtx.rotate(rot);
    sCtx.textAlign = 'center';
    sCtx.fillStyle = dark ? 'rgba(167,139,250,0.14)' : 'rgba(138,92,246,0.11)';
    sCtx.fillText(cat.toUpperCase(), 0, 2);
    sCtx.restore();
  });
}

  if (legEl) {

  bursts.length = 0;
  items.forEach(function(m) {
    if (m.days <= 0) {
      for (var bi = 0; bi < 24; bi++) {
        var ba = Math.random() * Math.PI * 2;
        var bv = 0.4 + Math.random() * 1.8;
        bursts.push({ x: C, y: C, vx: Math.cos(ba) * bv, vy: Math.sin(ba) * bv, r: 0.8 + Math.random() * 2, a: 0.9, c: m.c });
      }
    }
  });

  blips = items.filter(function(m) { return m.days <= MAX_DAYS; }).map(function(m) {
    var dist = (Math.max(0, m.days) / MAX_DAYS) * MR;
    var angle = catSectorAngle(m.cat, hashStr(m.n));
    var orbitSpeed = 0.00012 * Math.max(0.15, 1 - dist / MR) + 0.00003;
    return {
      id: m.id,
      angle: angle, targetDist: dist, dist: MR + 30,
      orbitSpeed: orbitSpeed,
      c: m.c, n: m.n, days: m.days, w: m.w || 1, cat: m.cat,
      phase: Math.random() * Math.PI * 2,
      lastSwept: -9999, x: 0, y: 0
    };
  });
}

var claimCelebration = { active: false, tier: null, start: 0, duration: 0 };

function claimMilestone(msId) {
  var ms = userMilestones.find(function(x) { return x.id === msId; });
  if (!ms) return;
  if (daysTo(ms.date) > 0) {
    if (typeof playError === 'function') playError();
    return;
  }

  var safeCat = migrateCategoryId(ms.cat);
  var baseXP = scaledMilestoneXP(safeCat);

  /* Close any open popups */
  blipOv.classList.remove('show');

  /* Archive + remove from active list */
  archiveMilestone(ms);
  var claimed = {};
  try { claimed = JSON.parse(localStorage.getItem('dragon_milestone_claimed') || '{}'); } catch (e) { claimed = {}; }
  claimed[ms.id] = new Date().toISOString();
  localStorage.setItem('dragon_milestone_claimed', JSON.stringify(claimed));
  userMilestones = userMilestones.filter(function(m) { return m.id !== msId; });
  saveMilestones(userMilestones);

  /* Switch to dragon tab */
  switchTab('dragon');

  /* Delay so tab switch is visible, then celebrate */
  setTimeout(function() {
    addXP(baseXP);
    celebrateClaim(safeCat, ms.icon || '\uD83D\uDCCC');
    triggerDragonReaction(safeCat);
    renderEventsPanel();
    updateBars();
    updateStatus();
    checkAch();
    saveDS(DS);
  }, 350);
}

function celebrateClaim(tier, icon) {
  if (tier === 'large') {
    evolFlash = 0.6;
    if (typeof confetti !== 'undefined') {
      setTimeout(function() {
        confetti({ particleCount: 120, spread: 80, origin: { y: 0.45 },
          colors: ['#8b5cf6', '#a78bfa', '#f59e0b', '#fbbf24', '#c4b5fd'] });
      }, 200);
      setTimeout(function() {
        confetti({ particleCount: 60, spread: 100, origin: { y: 0.5, x: 0.3 }, colors: ['#7c3aed', '#fbbf24'] });
        confetti({ particleCount: 60, spread: 100, origin: { y: 0.5, x: 0.7 }, colors: ['#7c3aed', '#fbbf24'] });
      }, 700);
    }
    if (typeof playChime === 'function') { playChime(); setTimeout(playChime, 500); }
  } else if (tier === 'medium') {
    evolFlash = 0.3;
    if (typeof confetti !== 'undefined') {
      setTimeout(function() {
        confetti({ particleCount: 50, spread: 60, origin: { y: 0.5 },
          colors: ['#f59e0b', '#fbbf24', '#a78bfa'] });
      }, 200);
    }
    if (typeof playChime === 'function') playChime();
  } else {
    /* Small: subtle shimmer + click */
    evolFlash = 0.12;
    if (typeof playClick === 'function') playClick();
  }
}

function triggerDragonReaction(tier) {
  claimCelebration.active = true;
  claimCelebration.tier = tier;
  claimCelebration.start = performance.now();
  claimCelebration.duration = tier === 'large' ? 4000 : tier === 'medium' ? 2500 : 1500;
}

function drawClaimReaction(ctx, t) {
  if (!claimCelebration.active) return;
  var elapsed = t - claimCelebration.start;
  if (elapsed > claimCelebration.duration) { claimCelebration.active = false; return; }
  var progress = elapsed / claimCelebration.duration;
  var fade = progress < 0.2 ? progress / 0.2 : progress > 0.8 ? (1 - progress) / 0.2 : 1;
  var tier = claimCelebration.tier;
  var stage = getStage(DS.xp);
  var cx = DC, cy = DC;

  if (tier === 'large') {
    /* Radial golden burst ГўВҖВ” scales with stage */
    var burstN = 12 + stage * 4;
    for (var i = 0; i < burstN; i++) {
      var a = (i / burstN) * Math.PI * 2 + elapsed * 0.001;
      var d = 20 + progress * 60 + Math.sin(elapsed * 0.005 + i) * 8;
      var px = cx + Math.cos(a) * d;
      var py = cy + Math.sin(a) * d * 0.7;
      var pr = (1.5 + Math.sin(elapsed * 0.008 + i * 0.5) * 0.8) * fade;
      ctx.beginPath(); ctx.arc(px, py, pr, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(251,191,36,' + (fade * 0.5) + ')'; ctx.fill();
    }
    /* Golden aura */
    var ar = 40 + Math.sin(elapsed * 0.004) * 8;
    var ag = ctx.createRadialGradient(cx, cy, 0, cx, cy, ar);
    ag.addColorStop(0, 'rgba(251,191,36,' + (fade * 0.2) + ')');
    ag.addColorStop(0.5, 'rgba(167,139,250,' + (fade * 0.1) + ')');
    ag.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(cx, cy, ar, 0, Math.PI * 2);
    ctx.fillStyle = ag; ctx.fill();
    /* Rising sparkles */
    for (var ri = 0; ri < 6 + stage * 2; ri++) {
      var rx = cx - 40 + ((elapsed * 0.03 + ri * 31) % 80);
      var ry = cy + 30 - ((elapsed * 0.04 + ri * 23) % 80);
      var rAlpha = fade * (0.3 + Math.sin(elapsed * 0.006 + ri) * 0.2);
      ctx.beginPath(); ctx.arc(rx, ry, 0.8 + Math.sin(ri * 1.7) * 0.4, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(251,191,36,' + rAlpha + ')'; ctx.fill();
    }
  } else if (tier === 'medium') {
    /* Sparkle ring */
    var sparkN = 8 + stage * 2;
    for (var j = 0; j < sparkN; j++) {
      var sa = (j / sparkN) * Math.PI * 2 + elapsed * 0.002;
      var sd = 30 + Math.sin(elapsed * 0.003 + j) * 10;
      var sx = cx + Math.cos(sa) * sd;
      var sy = cy + Math.sin(sa) * sd * 0.7;
      var sparkle = Math.pow(Math.sin(elapsed * 0.006 + j * 1.3), 2);
      ctx.beginPath(); ctx.arc(sx, sy, 1 + sparkle * 1.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(245,158,11,' + (fade * sparkle * 0.6) + ')'; ctx.fill();
    }
    /* Soft warm glow */
    var mg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 30);
    mg.addColorStop(0, 'rgba(245,158,11,' + (fade * 0.08) + ')');
    mg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(cx, cy, 30, 0, Math.PI * 2);
    ctx.fillStyle = mg; ctx.fill();
  } else {
    /* Small: brief purple shimmer across canvas */
    var shimA = fade * 0.06;
    ctx.fillStyle = 'rgba(167,139,250,' + shimA + ')';
    ctx.fillRect(0, 0, DSZ, DSZ);
  }
}

function drawRadar(t) {
  if (loadTime < 0) loadTime = t;
  ctx.clearRect(0, 0, SZ, SZ);
  var sweep = ((t % ROT_MS) / ROT_MS) * Math.PI * 2;

  ctx.drawImage(staticCv, 0, 0, SZ, SZ);

  /* Sweep cone */
  var SL = 30, CONE = 0.7;
  for (var i = SL - 1; i >= 0; i--) {
    var f = i / SL;
    var a1 = sweep - CONE * f;
    var a2 = sweep - CONE * (f + 1 / SL);
    if (a2 < a1) { var tmp = a1; a1 = a2; a2 = tmp; }
    ctx.beginPath(); ctx.moveTo(C, C);
    ctx.arc(C, C, MR, a1, a2); ctx.closePath();
    ctx.fillStyle = 'rgba(138,92,246,' + ((1 - f) * (dark ? 0.10 : 0.06)) + ')';
    ctx.fill();
  }

  /* Sweep line */
  var sx = C + Math.cos(sweep) * MR;
  var sy = C + Math.sin(sweep) * MR;
  var lg = ctx.createLinearGradient(C, C, sx, sy);
  lg.addColorStop(0, 'rgba(138,92,246,0)');
  lg.addColorStop(0.4, dark ? 'rgba(167,139,250,0.35)' : 'rgba(138,92,246,0.25)');
  lg.addColorStop(1, dark ? 'rgba(167,139,250,0.75)' : 'rgba(138,92,246,0.55)');
  ctx.beginPath(); ctx.moveTo(C, C); ctx.lineTo(sx, sy);
  ctx.strokeStyle = lg; ctx.lineWidth = 1.5; ctx.stroke();

  var tg = ctx.createRadialGradient(sx, sy, 0, sx, sy, 6);
  tg.addColorStop(0, dark ? 'rgba(167,139,250,0.5)' : 'rgba(138,92,246,0.4)');
  tg.addColorStop(1, 'rgba(138,92,246,0)');
  ctx.beginPath(); ctx.arc(sx, sy, 6, 0, Math.PI * 2);
  ctx.fillStyle = tg; ctx.fill();

  /* Sonar ping */
  if (sweep < 0.3 && t - lastPingTime > ROT_MS * 0.85) {
    lastPingTime = t;
    pings.push({ r: 3, a: 0.35 });
  }
  for (var pi = pings.length - 1; pi >= 0; pi--) {
    var pg = pings[pi];
    pg.r += 0.5; pg.a -= 0.005;
    if (pg.a <= 0) { pings.splice(pi, 1); continue; }
    ctx.beginPath(); ctx.arc(C, C, pg.r, 0, Math.PI * 2);
    ctx.strokeStyle = dark ? 'rgba(167,139,250,' + pg.a + ')' : 'rgba(138,92,246,' + pg.a + ')';
    ctx.lineWidth = 0.8; ctx.stroke();
  }

  /* Echo rings */
  for (var e = echoes.length - 1; e >= 0; e--) {
    var ec = echoes[e];
    ec.r += 0.4; ec.a -= 0.012;
    if (ec.a <= 0) { echoes.splice(e, 1); continue; }
    ctx.beginPath(); ctx.arc(ec.x, ec.y, ec.r, 0, Math.PI * 2);
    ctx.strokeStyle = hexRgba(ec.c, ec.a);
    ctx.lineWidth = 1; ctx.stroke();
  }

  /* Burst particles */
  for (var bi = bursts.length - 1; bi >= 0; bi--) {
    var bp = bursts[bi];
    bp.x += bp.vx; bp.y += bp.vy;
    bp.vx *= 0.97; bp.vy *= 0.97;
    bp.a -= 0.007;
    if (bp.a <= 0) { bursts.splice(bi, 1); continue; }
    ctx.beginPath(); ctx.arc(bp.x, bp.y, bp.r, 0, Math.PI * 2);
    ctx.fillStyle = hexRgba(bp.c, bp.a); ctx.fill();
  }

  /* Blips */
  var entryElapsed = t - loadTime;
  blips.forEach(function(b, bIdx) {
    b.angle += b.orbitSpeed;
    var bDelay = bIdx * 150;
    var bProg = Math.min(Math.max(0, entryElapsed - bDelay) / ENTRY_DUR, 1);
    bProg = 1 - Math.pow(1 - bProg, 3);
    b.dist = b.targetDist + (MR + 30 - b.targetDist) * (1 - bProg);
    b.x = C + Math.cos(b.angle) * b.dist;
    b.y = C + Math.sin(b.angle) * b.dist;
    if (bProg < 0.05) return;

    var ws = 0.7 + b.w * 0.35;
    var diff = sweep - (b.angle % (Math.PI * 2));
    if (diff < 0) diff += Math.PI * 2;
    var intensity = diff < 0.4 ? Math.max(0, 1 - diff / 0.4) : 0;
    var pulse = 0.35 + 0.2 * Math.sin(t * 0.003 + b.phase);
    var total = Math.min(Math.max(pulse, intensity), 1);

    if (diff < 0.15 && t - b.lastSwept > 2000 && bProg > 0.8) {
      b.lastSwept = t;
      echoes.push({ x: b.x, y: b.y, r: 4 * ws, a: 0.5, c: b.c });
    }

    var gr = (5 + intensity * 6) * ws;
    var gg = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, gr);
    gg.addColorStop(0, hexRgba(b.c, total * 0.5));
    gg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(b.x, b.y, gr, 0, Math.PI * 2);
    ctx.fillStyle = gg; ctx.fill();

    var cr = (2.5 + intensity * 1.5) * ws;
    ctx.beginPath(); ctx.arc(b.x, b.y, cr, 0, Math.PI * 2);
    ctx.globalAlpha = total * bProg; ctx.fillStyle = b.c; ctx.fill();
    ctx.globalAlpha = 1;

    if (intensity > 0.15) {
      ctx.font = '600 ' + Math.round(7 * ws) + 'px Inter';
      ctx.fillStyle = hexRgba(b.c, intensity * 0.85);
      ctx.textAlign = 'center';
      ctx.fillText(b.days + 'd', b.x, b.y - 10 * ws);
    }
  });

  /* Centre core */
  var threat = getThreatLevel();
  var coreHue = Math.round(260 - threat * 200);
  var cp = 2.5 + Math.sin(t * 0.002) * 0.5;
  var coreR = cp + 5 + threat * 4;
  var cg = ctx.createRadialGradient(C, C, 0, C, C, coreR);
  cg.addColorStop(0, 'hsla(' + coreHue + ',75%,' + (dark ? 70 : 60) + '%,0.7)');
  cg.addColorStop(0.5, 'hsla(' + coreHue + ',75%,' + (dark ? 70 : 60) + '%,0.15)');
  cg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(C, C, coreR, 0, Math.PI * 2);
  ctx.fillStyle = cg; ctx.fill();
  ctx.beginPath(); ctx.arc(C, C, cp, 0, Math.PI * 2);
  ctx.fillStyle = 'hsl(' + coreHue + ',75%,' + (dark ? 70 : 60) + '%)'; ctx.fill();

  if (items.length > 0 && items[0].days <= 30) {
    ctx.font = '700 6px Inter';
    ctx.fillStyle = dark ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.18)';
    ctx.textAlign = 'center';
    ctx.fillText(items[0].days + 'd', C, C + cp + 13);
  }
}

function getBlipFromEvent(e) {
  var rect = cv.getBoundingClientRect();
  var cx = e.clientX, cy = e.clientY;
  if (e.changedTouches && e.changedTouches.length) {
    cx = e.changedTouches[0].clientX;
    cy = e.changedTouches[0].clientY;
  }
  var mx = (cx - rect.left) * (SZ / rect.width);
  var my = (cy - rect.top) * (SZ / rect.height);
  var hit = null, best = 28;
  blips.forEach(function(b) {
    var dx = mx - b.x, dy = my - b.y;
    var d = Math.sqrt(dx * dx + dy * dy);
    if (d < best) { best = d; hit = b; }
  });
  return hit;
}

/* ГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•Вҗ
   10. INITIAL SUMMONING ANIMATION
   ГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•Вҗ */

var summonActive = true;
var summonStart = -1;
var SUMMON_DUR = 3000;

var sParts = [];
for (var _sp = 0; _sp < 50; _sp++) {
  var _sa = Math.random() * Math.PI * 2;
  sParts.push({
    angle: _sa,
    dist: 70 + Math.random() * 50,
    size: 0.8 + Math.random() * 2,
    speed: 0.6 + Math.random() * 0.4,
    phase: Math.random() * Math.PI * 2,
    orbit: 0.001 + Math.random() * 0.002
  });
}

function drawSummonAnim(t) {
  if (summonStart < 0) {
    summonStart = t;
    try { _playSummonIntro(); } catch(e) {}
  }
  var elapsed = t - summonStart;
  var p = Math.min(elapsed / SUMMON_DUR, 1);
  dctx.clearRect(0, 0, DSZ, DSZ);

  /* Phase 1 (0-0.55): Particles converge with orbital motion */
  if (p < 0.8) {
    var converge = Math.min(p / 0.55, 1);
    converge = converge * converge;
    for (var i = 0; i < sParts.length; i++) {
      var sp = sParts[i];
      sp.angle += sp.orbit * (1 + converge * 3);
      var d = sp.dist * (1 - converge * 0.92);
      var wobble = Math.sin(elapsed * 0.005 + sp.phase) * (1 - converge) * 12;
      var px = DC + Math.cos(sp.angle) * d + Math.cos(sp.angle + Math.PI / 2) * wobble;
      var py = DC + Math.sin(sp.angle) * d + Math.sin(sp.angle + Math.PI / 2) * wobble;
      var alpha = Math.min(p * 4, 1) * (0.4 + 0.6 * (1 - converge * 0.4));
      var pg = dctx.createRadialGradient(px, py, 0, px, py, sp.size * 4);
      pg.addColorStop(0, 'rgba(' + (dark ? '167,139,250' : '139,92,246') + ',' + (alpha * 0.35) + ')');
      pg.addColorStop(1, 'rgba(138,92,246,0)');
      dctx.beginPath(); dctx.arc(px, py, sp.size * 4, 0, Math.PI * 2);
      dctx.fillStyle = pg; dctx.fill();
      dctx.beginPath(); dctx.arc(px, py, sp.size * (1 - converge * 0.3), 0, Math.PI * 2);
      dctx.fillStyle = 'rgba(' + (dark ? '200,180,255' : '160,120,246') + ',' + alpha + ')';
      dctx.fill();
    }
  }

  /* Phase 2 (0.2-0.85): Core energy builds */
  if (p > 0.2 && p < 0.85) {
    var coreP = Math.min((p - 0.2) / 0.5, 1);
    var coreR = 4 + coreP * 35;
    var pulse = 1 + Math.sin(elapsed * 0.008) * 0.15;
    var cg = dctx.createRadialGradient(DC, DC, 0, DC, DC, coreR * pulse);
    cg.addColorStop(0, 'rgba(' + (dark ? '167,139,250' : '139,92,246') + ',' + (coreP * 0.55) + ')');
    cg.addColorStop(0.4, 'rgba(' + (dark ? '139,92,246' : '124,58,237') + ',' + (coreP * 0.2) + ')');
    cg.addColorStop(1, 'rgba(138,92,246,0)');
    dctx.beginPath(); dctx.arc(DC, DC, coreR * pulse, 0, Math.PI * 2);
    dctx.fillStyle = cg; dctx.fill();
    var dotR = 2 + coreP * 3;
    dctx.beginPath(); dctx.arc(DC, DC, dotR, 0, Math.PI * 2);
    dctx.fillStyle = 'rgba(' + (dark ? '220,210,255' : '180,160,246') + ',' + (coreP * 0.8) + ')';
    dctx.fill();
  }

  /* Energy rings pulsing inward */
  if (p > 0.15 && p < 0.75) {
    var ringP = (p - 0.15) / 0.6;
    for (var ri = 0; ri < 3; ri++) {
      var rPhase = (ringP * 2.5 + ri * 0.33) % 1;
      var ringR = 80 * (1 - rPhase);
      var ringA = Math.sin(rPhase * Math.PI) * 0.25;
      dctx.beginPath(); dctx.arc(DC, DC, ringR, 0, Math.PI * 2);
      dctx.strokeStyle = 'rgba(' + (dark ? '167,139,250' : '139,92,246') + ',' + ringA + ')';
      dctx.lineWidth = 1.2 * (1 - rPhase);
      dctx.stroke();
    }
  }

  /* Phase 3 (0.6-1.0): Flash + dragon materialises */
  if (p > 0.6) {
    var revealP = (p - 0.6) / 0.4;
    if (revealP < 0.3) {
      var flashA = Math.sin(revealP / 0.3 * Math.PI) * (dark ? 0.2 : 0.15);
      dctx.fillStyle = 'rgba(' + (dark ? '167,139,250' : '200,180,255') + ',' + flashA + ')';
      dctx.fillRect(0, 0, DSZ, DSZ);
    }
    var dragonA = Math.max(0, (revealP - 0.1) / 0.9);
    dragonA = 1 - Math.pow(1 - dragonA, 2);
    dctx.globalAlpha = dragonA;
    var stage = getStage(DS.xp);
    if (stage === 0) {
      if (useThreeEgg) {
        EggScene.render(t, DS);
      } else {
        drawEgg(dctx, t);
      }
    }
    else if (stage === 1) drawHatchling(dctx, t);
    else if (stage === 2) drawFledgling(dctx, t);
    else if (stage === 3) drawJuvenile(dctx, t);
    else if (stage === 4) drawAdult(dctx, t);
    else drawElder(dctx, t);
    dctx.globalAlpha = 1;
    if (revealP < 0.6) {
      var scatterA = (1 - revealP / 0.6) * 0.35;
      for (var si = 0; si < sParts.length; si += 2) {
        var spp = sParts[si];
        var sd = revealP * 55 * spp.speed;
        var spx = DC + Math.cos(spp.angle) * sd;
        var spy = DC + Math.sin(spp.angle) * sd;
        dctx.beginPath(); dctx.arc(spx, spy, spp.size * 0.7, 0, Math.PI * 2);
        dctx.fillStyle = 'rgba(' + (dark ? '167,139,250' : '139,92,246') + ',' + scatterA + ')';
        dctx.fill();
      }
    }
  }

  if (p >= 1) summonActive = false;
}

/* Summoning sound: ethereal ascending tone */
function _playSummonIntro() {
  var ctx = getAudioCtx(), now = ctx.currentTime;
  var osc = ctx.createOscillator();
  var gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(180, now);
  osc.frequency.exponentialRampToValueAtTime(520, now + 2.0);
  gain.gain.setValueAtTime(0.001, now);
  gain.gain.linearRampToValueAtTime(0.07, now + 0.5);
  gain.gain.setValueAtTime(0.07, now + 1.2);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(now); osc.stop(now + 2.6);
  var osc2 = ctx.createOscillator();
  var gain2 = ctx.createGain();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(360, now + 0.3);
  osc2.frequency.exponentialRampToValueAtTime(780, now + 2.0);
  gain2.gain.setValueAtTime(0.001, now + 0.3);
  gain2.gain.linearRampToValueAtTime(0.035, now + 0.8);
  gain2.gain.exponentialRampToValueAtTime(0.001, now + 2.4);
  osc2.connect(gain2); gain2.connect(ctx.destination);
  osc2.start(now + 0.3); osc2.stop(now + 2.5);
}

/* ГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•Вҗ
   11. ANIMATION LOOPS
   ГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•Вҗ */

var running = true, lastFrame = 0;
var prefersRM = Core.reducedMotion;

function loop(t) {
  if (!running) return;
  if (prefersRM) {
    drawDragon(0);
    drawRadar(0);
    return;
  }
  if (t - lastFrame < 32) { requestAnimationFrame(loop); return; }
  lastFrame = t;

  if (summonActive && activeTab === 'dragon') drawSummonAnim(t);
  else if (activeTab === 'dragon') { checkWant(t); drawDragon(t); drawClaimReaction(dctx, t); }
  else drawRadar(t);

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

document.addEventListener('visibilitychange', function() {
  if (document.hidden) { running = false; }
  else {
    running = true;
    /* Re-pull latest state from SyncEngine for cross-device sync */
    SyncEngine.init({
      worker: 'https://widget-sync.lordgrape-widgets.workers.dev',
      namespaces: ['dragon', 'clock', 'user']
    }).then(function() {
      var remote = SyncEngine.getAll('dragon');
      if (remote && typeof remote.xp !== 'undefined') {
        DS = initDS();
        prevStage = getStage(DS.xp);
      } else {
        DS.lastVisit = new Date().toISOString();
        saveDS(DS);
      }
      updateBars();
      updateStatus();
      try {
        userMilestones = processExpiredMilestones();
        if (typeof renderEventsPanel === 'function') renderEventsPanel();
        if (typeof checkAch === 'function') checkAch();
        if (typeof renderAch === 'function') renderAch();
      } catch (e) {}
    }).catch(function() {
      DS.lastVisit = new Date().toISOString();
      saveDS(DS);
      updateBars();
      updateStatus();
    });
    requestAnimationFrame(loop);
  }
});

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   CHECK FOR UPDATES вҖ” cache-bust reload
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
(function() {
  var btn = document.getElementById('updateBtn');
  if (!btn) return;

  btn.addEventListener('click', function() {
    btn.classList.add('checking');
    if (typeof playClick === 'function') playClick();

    var bustUrl = window.location.href.split('?')[0] + '?_cb=' + Date.now();
    fetch(bustUrl, { cache: 'no-store' })
      .then(function(res) { return res.text(); })
      .then(function(html) {
        var currentHash = document.documentElement.outerHTML.length;
        var fetchedHash = html.length;
        if (currentHash !== fetchedHash) {
          window.location.href = bustUrl;
        } else {
          btn.classList.remove('checking');
          btn.style.opacity = '0.6';
          btn.title = 'Up to date \u2713';
          setTimeout(function() {
            btn.style.opacity = '';
            btn.title = 'Check for updates';
          }, 2000);
        }
      })
      .catch(function() {
        btn.classList.remove('checking');
        window.location.reload(true);
      });
  });
})();

</script>

<script>
/* ГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•Вҗ
   THYMOS ГўВҶВ” RADAR INTEGRATION (post-load)
   Dynamic milestones + radar chrome
   ГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•ВҗГўВ•Вҗ */

/* ГўВ”ВҖГўВ”ВҖ Dragon stage ГўВҶВ’ radar glow + title ГўВ”ВҖГўВ”ВҖ */
(function() {
  var stage = getStage(DS.xp);
  var rd = document.querySelector('.radar');
  if (rd) {
    var g = 2 + stage * 4, gold = stage / 5;
    var cr = Math.round(138 + gold * 113), cg2 = Math.round(92 + gold * 99), cb = Math.round(246 - gold * 210);
    rd.style.filter = 'drop-shadow(0 0 ' + g + 'px rgba(' + cr + ',' + cg2 + ',' + cb + ',0.' + (15 + stage * 8) + '))';
  }
  var pt = document.querySelector('.panel-title');
  if (pt) {
    var titles = ['Dormant Horizon','Awakening Horizon','Rising Horizon','Surging Horizon','Blazing Horizon','Transcendent Horizon'];
    pt.textContent = titles[stage] || 'Mission Timeline';
  }
})();

function revealHorizon() {
  var sk = document.getElementById('hzSkeleton');
  var c = document.getElementById('hzContent');
  if (!sk || !c) return;
  c.classList.remove('loading');
  sk.style.opacity = '0';
  sk.style.transition = 'opacity 220ms ease';
  setTimeout(function() { if (sk.parentNode) sk.remove(); }, 260);
}
if (SyncEngine && typeof SyncEngine.onReady === 'function') SyncEngine.onReady(revealHorizon);
setTimeout(revealHorizon, 650);
</script>
