<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Quote</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #ffffff;
  --card-bg: rgba(255, 255, 255, 0.96);
  --card-border: rgba(138, 92, 246, 0.12);
  --card-shadow: 0 4px 24px rgba(0,0,0,0.06);
  --card-glow: 0 0 20px 2px rgba(138, 92, 246, 0.06);
  --label-color: rgba(124, 58, 237, 0.5);
  --quote-grad: linear-gradient(135deg, #1a1a2e 0%, #7c3aed 40%, #8b5cf6 60%, #1a1a2e 100%);
  --author-color: rgba(100, 100, 120, 0.5);
  --book-color: rgba(100, 100, 120, 0.35);
  --orb-alpha: 0.025;
  --particle-rgb: 124, 58, 237;
  --particle-alpha: 0.12;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #191919;
    --card-bg: rgba(25, 25, 35, 0.94);
    --card-border: rgba(138, 92, 246, 0.15);
    --card-shadow: 0 8px 40px rgba(0,0,0,0.4);
    --card-glow: 0 0 24px 4px rgba(138, 92, 246, 0.12);
    --label-color: rgba(167, 139, 250, 0.65);
    --quote-grad: linear-gradient(135deg, #fff 0%, #c4b5fd 25%, #8b5cf6 50%, #a78bfa 75%, #fff 100%);
    --author-color: rgba(160, 160, 180, 0.5);
    --book-color: rgba(160, 160, 180, 0.35);
      --orb-alpha: 0.045;
    --particle-rgb: 167, 139, 250;
    --particle-alpha: 0.3;
  }
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  pointer-events: none;
  transition: background 0.3s;
}

#bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes breathe {
  0%, 100% { box-shadow: var(--card-shadow), 0 0 0 0 transparent; }
  30%      { box-shadow: var(--card-shadow), var(--card-glow); }
}
@keyframes gradientShift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ── Thin banner card ── */
.container {
  position: relative; z-index: 1;
  text-align: center;
  padding: 14px 36px 12px;
  border-radius: 14px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  max-width: 100%;
  width: 98%;
  animation: fadeIn 0.8s ease-out, breathe 8s cubic-bezier(0.4,0,0.2,1) infinite;
}

.label {
  font-size: 9px; font-weight: 300;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--label-color);
  margin-bottom: 6px;
  font-variant-numeric: tabular-nums;
  opacity: 0; animation: fadeIn 1s ease-out 0.3s forwards;
}

.quote {
  font-size: clamp(13px, 1.8vw, 18px);
  font-weight: 500;
  font-style: italic;
  line-height: 1.4;
  letter-spacing: -0.2px;
  background: var(--quote-grad);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradientShift 6s ease infinite;
  padding: 0 8px;
  max-width: 900px;
  margin: 0 auto;
}

/* ── Attribution row ── */
.attribution {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 6px;
  opacity: 0; animation: fadeIn 1s ease-out 0.55s forwards;
}

.author {
  font-size: clamp(9px, 1.2vw, 11px);
  font-weight: 400;
  color: var(--author-color);
  letter-spacing: 0.5px;
}

.separator {
  font-size: 9px;
  color: var(--book-color);
}

.book {
  font-size: clamp(8px, 1vw, 10px);
  font-weight: 300;
  color: var(--book-color);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="container">
  <div class="label" id="label">Daily Wisdom</div>
  <div class="quote" id="quote"></div>
  <div class="attribution">
    <div class="author" id="author"></div>
    <div class="separator">·</div>
    <div class="book" id="book"></div>
  </div>
</div>
<script>
var quotes = [
  { text: "You have power over your mind, not outside events. Realize this, and you will find strength.", author: "Marcus Aurelius", book: "Meditations" },
  { text: "The impediment to action advances action. What stands in the way becomes the way.", author: "Marcus Aurelius", book: "Meditations" },
  { text: "Waste no more time arguing about what a good man should be. Be one.", author: "Marcus Aurelius", book: "Meditations" },
  { text: "It is not what happens to you, but how you react to it that matters.", author: "Epictetus", book: "Enchiridion" },
  { text: "No man is free who is not master of himself.", author: "Epictetus", book: "Fragments" },
  { text: "First say to yourself what you would be; and then do what you have to do.", author: "Epictetus", book: "Discourses" },
  { text: "We suffer more often in imagination than in reality.", author: "Seneca", book: "Letters from a Stoic" },
  { text: "True happiness is to enjoy the present, without anxious dependence upon the future.", author: "Seneca", book: "Letters from a Stoic" },
  { text: "It is not that we have a short time to live, but that we waste a great deal of it.", author: "Seneca", book: "On the Shortness of Life" },
  { text: "He who has a why to live can bear almost any how.", author: "Friedrich Nietzsche", book: "Twilight of the Idols" },
  { text: "That which does not kill us makes us stronger.", author: "Friedrich Nietzsche", book: "Twilight of the Idols" },
  { text: "Any fool can criticize, condemn, and complain. But it takes character and self-control to be understanding and forgiving.", author: "Dale Carnegie", book: "How to Win Friends & Influence People" },
  { text: "You can make more friends in two months by becoming interested in other people than in two years by trying to get other people interested in you.", author: "Dale Carnegie", book: "How to Win Friends & Influence People" },
  { text: "Every action you take is a vote for the type of person you wish to become.", author: "James Clear", book: "Atomic Habits" },
  { text: "You do not rise to the level of your goals. You fall to the level of your systems.", author: "James Clear", book: "Atomic Habits" },
  { text: "The highest form of wealth is the ability to wake up every morning and say, I can do whatever I want today.", author: "Morgan Housel", book: "The Psychology of Money" },
  { text: "Doing well with money has little to do with how smart you are and a lot to do with how you behave.", author: "Morgan Housel", book: "The Psychology of Money" },
  { text: "There is nothing more difficult to take in hand, more perilous to conduct, or more uncertain in its success, than to take the lead in the introduction of a new order of things.", author: "Niccolò Machiavelli", book: "The Prince" },
  { text: "The future belongs to those who learn more skills and combine them in creative ways.", author: "Robert Greene", book: "Mastery" },
  { text: "The key to doing well in school is not to study more. It is to study smarter.", author: "Cal Newport", book: "How to Become a Straight-A Student" },
  { text: "The real difference between us and chimpanzees is the mythical glue that binds together large numbers of individuals, families, and groups.", author: "Yuval Noah Harari", book: "Sapiens" },
  { text: "The universe is under no obligation to make sense to you.", author: "Neil deGrasse Tyson", book: "Astrophysics for People in a Hurry" },
  { text: "The task of philosophy is not to explain the world but to help us live well in it.", author: "John Sellars", book: "Lessons in Stoicism" },
  { text: "Whoever fights monsters should see to it that in the process he does not become a monster.", author: "Friedrich Nietzsche", book: "Beyond Good and Evil" },
  { text: "Man is born free, and everywhere he is in chains.", author: "Jean-Jacques Rousseau", book: "The Social Contract" },
  { text: "Appear weak when you are strong, and strong when you are weak.", author: "Sun Tzu", book: "The Art of War" },
  { text: "The beginning is the most important part of the work.", author: "Plato", book: "The Republic" },
  { text: "Stillness is what aims the archer's arrow. It inspires new ideas. It sharpens perspective and illuminates connections.", author: "Ryan Holiday", book: "Stillness is The Key" },
  { text: "The real measure of any time management technique is whether or not it helps you neglect the right things.", author: "Oliver Burkeman", book: "Four Thousand Weeks" },
  { text: "The time that leads to mastery is dependent on the intensity of our focus.", author: "Robert Greene", book: "Mastery" },
  { text: "The history of all hitherto existing society is the history of class struggles.", author: "Karl Marx", book: "The Communist Manifesto" },
  { text: "The shorter your sleep, the shorter your life span.", author: "Matthew Walker", book: "Why We Sleep" },
  { text: "Being all equal and independent, no one ought to harm another in his life, health, liberty, or possessions.", author: "John Locke", book: "Second Treatise of Government" },
  { text: "The richest people in the world look for and build networks; everyone else looks for work.", author: "Robert Kiyosaki", book: "Rich Dad, Poor Dad" },
  { text: "Change might not be fast and it isn't always easy. But with time and effort, almost any habit can be reshaped.", author: "Charles Duhigg", book: "The Power of Habit" },
];

/* Deterministic daily index based on day-of-year */
function getDailyIndex() {
  var now = new Date();
  var start = new Date(now.getFullYear(), 0, 0);
  var diff = now - start;
  var oneDay = 1000 * 60 * 60 * 24;
  return Math.floor(diff / oneDay) % quotes.length;
}

var currentIndex = getDailyIndex();

function render() {
  var q = quotes[currentIndex];
  document.getElementById('quote').textContent = '\u201C' + q.text + '\u201D';
  document.getElementById('author').textContent = q.author;
  document.getElementById('book').textContent = q.book;
}

render();

/* Auto-rotate at midnight */
function msUntilMidnight() {
  var now = new Date();
  var midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0);
  return midnight - now;
}
setTimeout(function refresh() {
  currentIndex = getDailyIndex();
  render();
  setTimeout(refresh, msUntilMidnight());
}, msUntilMidnight());

/* ── Background: orbs + particles (lighter for banner) ── */
var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
var ORB_ALPHA = isDark ? 0.04 : 0.02;
var P_RGB = isDark ? '167, 139, 250' : '124, 58, 237';
var P_ALPHA_BASE = isDark ? 0.25 : 0.1;

var canvas = document.getElementById('bg');
var ctx = canvas.getContext('2d');
var W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

var orbs = Array.from({ length: 2 }, function() {
  return {
    x: Math.random() * innerWidth, y: Math.random() * innerHeight,
    r: 60 + Math.random() * 100, dx: (Math.random() - 0.5) * 0.2, dy: (Math.random() - 0.5) * 0.2,
    hue: 260 + Math.random() * 30, alpha: ORB_ALPHA + Math.random() * 0.01
  };
});
var particles = Array.from({ length: isDark ? 12 : 8 }, function() {
  return {
    x: Math.random() * innerWidth, y: Math.random() * innerHeight,
    r: 0.8 + Math.random() * 1.5, speed: 0.1 + Math.random() * 0.25,
    alpha: P_ALPHA_BASE * (0.4 + Math.random() * 0.6), flicker: Math.random() * Math.PI * 2
  };
});

function drawOrbs() {
  for (var i = 0; i < orbs.length; i++) {
    var o = orbs[i];
    o.x += o.dx; o.y += o.dy;
    if (o.x < -o.r) o.x = W + o.r; if (o.x > W + o.r) o.x = -o.r;
    if (o.y < -o.r) o.y = H + o.r; if (o.y > H + o.r) o.y = -o.r;
    var g = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r);
    g.addColorStop(0, 'hsla(' + o.hue + ', 70%, 50%, ' + o.alpha + ')');
    g.addColorStop(1, 'hsla(' + o.hue + ', 70%, 50%, 0)');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2); ctx.fill();
  }
}
function drawParticles(time) {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    p.y -= p.speed; if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
    var a = p.alpha * (0.5 + 0.5 * Math.sin(time * 0.002 + p.flicker));
    ctx.fillStyle = 'rgba(' + P_RGB + ', ' + a + ')';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  }
}
var animRunning = true;
var lastFrame = 0;
function animate(time) {
  if (!animRunning) return;
  if (time - lastFrame < 32) { requestAnimationFrame(animate); return; }
  lastFrame = time;
  ctx.clearRect(0, 0, W, H); drawOrbs(); drawParticles(time);
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
document.addEventListener('visibilitychange', function() {
  if (document.hidden) { animRunning = false; }
  else { animRunning = true; requestAnimationFrame(animate); }
});
</script>
</body>
</html>
