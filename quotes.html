<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Quote</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #ffffff;
    --text: #37352f;
    --sub: #787774;
    --accent: #d3d1cb;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #191919;
      --text: #ffffffcf;
      --sub: #ffffff73;
      --accent: #ffffff1a;
    }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }

  .container {
    text-align: center;
    padding: 16px 40px;
    max-width: 960px;
    width: 100%;
    opacity: 0;
    animation: fadeIn 1s ease forwards;
  }

  .quote {
    font-size: clamp(14px, 2.2vw, 18px);
    font-weight: 500;
    font-style: italic;
    line-height: 1.5;
    letter-spacing: 0.01em;
    transition: opacity 0.8s ease;
  }

  .attribution {
    margin-top: 8px;
    font-size: clamp(11px, 1.4vw, 13px);
    color: var(--sub);
    font-weight: 400;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    transition: opacity 0.8s ease;
  }

  .divider {
    width: 32px;
    height: 2px;
    background: var(--accent);
    margin: 10px auto 0;
    border-radius: 1px;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  .fade-out .quote,
  .fade-out .attribution {
    opacity: 0;
  }
</style>
</head>
<body>
<div class="container" id="root">
  <div class="quote" id="quote"></div>
  <div class="attribution" id="attribution"></div>
  <div class="divider"></div>
</div>
<script>
const quotes = [
  // Marcus Aurelius — Meditations
  { text: "You have power over your mind, not outside events. Realize this, and you will find strength.", author: "Marcus Aurelius", book: "Meditations" },
  { text: "The impediment to action advances action. What stands in the way becomes the way.", author: "Marcus Aurelius", book: "Meditations" },
  { text: "Waste no more time arguing about what a good man should be. Be one.", author: "Marcus Aurelius", book: "Meditations" },

  // Epictetus — Discourses and Selected Writings
  { text: "It is not what happens to you, but how you react to it that matters.", author: "Epictetus", book: "Discourses" },
  { text: "No man is free who is not master of himself.", author: "Epictetus", book: "Discourses" },
  { text: "First say to yourself what you would be; and then do what you have to do.", author: "Epictetus", book: "Discourses" },

  // Seneca — Letters from a Stoic
  { text: "We suffer more often in imagination than in reality.", author: "Seneca", book: "Letters from a Stoic" },
  { text: "Luck is what happens when preparation meets opportunity.", author: "Seneca", book: "Letters from a Stoic" },
  { text: "It is not that we have a short time to live, but that we waste a great deal of it.", author: "Seneca", book: "Letters from a Stoic" },

  // Friedrich Nietzsche
  { text: "He who has a why to live can bear almost any how.", author: "Friedrich Nietzsche", book: "Twilight of the Idols" },
  { text: "That which does not kill us makes us stronger.", author: "Friedrich Nietzsche", book: "Twilight of the Idols" },

  // Dale Carnegie — How to Win Friends & Influence People
  { text: "Any fool can criticize, complain, and condemn. But it takes character and self-control to be understanding and forgiving.", author: "Dale Carnegie", book: "How to Win Friends & Influence People" },
  { text: "You can make more friends in two months by becoming interested in other people than in two years by trying to get other people interested in you.", author: "Dale Carnegie", book: "How to Win Friends & Influence People" },

  // James Clear — Atomic Habits
  { text: "Every action you take is a vote for the type of person you wish to become.", author: "James Clear", book: "Atomic Habits" },
  { text: "You do not rise to the level of your goals. You fall to the level of your systems.", author: "James Clear", book: "Atomic Habits" },

  // Morgan Housel — The Psychology of Money
  { text: "The highest form of wealth is the ability to wake up every morning and say, I can do whatever I want today.", author: "Morgan Housel", book: "The Psychology of Money" },
  { text: "Doing well with money has little to do with how smart you are and a lot to do with how you behave.", author: "Morgan Housel", book: "The Psychology of Money" },

  // Niccolò Machiavelli — The Prince
  { text: "There is nothing more difficult to take in hand, more perilous to conduct, or more uncertain in its success, than to take the lead in the introduction of a new order of things.", author: "Niccolò Machiavelli", book: "The Prince" },

  // Robert Greene — The 48 Laws of Power
  { text: "The future belongs to those who learn more skills and combine them in creative ways.", author: "Robert Greene", book: "The 48 Laws of Power" },

  // Cal Newport — How to Become a Straight-A Student
  { text: "The key to doing well in school is not to study more. It is to study smarter.", author: "Cal Newport", book: "How to Become a Straight-A Student" },

  // Yuval Noah Harari — Sapiens
  { text: "The real difference between us and chimpanzees is the mythical glue that binds together large numbers of individuals, families, and groups.", author: "Yuval Noah Harari", book: "Sapiens" },

  // Neil deGrasse Tyson — Starry Messenger
  { text: "The universe is under no obligation to make sense to you.", author: "Neil deGrasse Tyson", book: "Starry Messenger" },

  // John Sellars — Lessons in Stoicism
  { text: "The task of philosophy is not to explain the world but to help us live well in it.", author: "John Sellars", book: "Lessons in Stoicism" },
];

function getDailyQuote() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const diff = now - start;
  const oneDay = 1000 * 60 * 60 * 24;
  const dayOfYear = Math.floor(diff / oneDay);
  return quotes[dayOfYear % quotes.length];
}

function render() {
  const q = getDailyQuote();
  document.getElementById("quote").textContent = '"' + q.text + '"';
  document.getElementById("attribution").textContent = q.author + " — " + q.book;
}

render();
</script>
</body>
</html>
