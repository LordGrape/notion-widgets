<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: #0a0a10;
  color: #e0e0e0;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
}
#bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes glowPulse {
  0%, 100% {
    box-shadow: 0 8px 40px rgba(0,0,0,0.4), 0 0 0 0 rgba(138,92,246,0), inset 0 0 0 0 rgba(138,92,246,0);
  }
  50% {
    box-shadow: 0 8px 40px rgba(0,0,0,0.4), 0 0 24px 4px rgba(138,92,246,0.15), inset 0 0 20px 0 rgba(138,92,246,0.03);
  }
}
@keyframes gradientShift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.25; }
}
.container {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 36px 52px;
  border-radius: 20px;
  background: rgba(16, 12, 28, 0.75);
  backdrop-filter: blur(16px) saturate(1.4);
  -webkit-backdrop-filter: blur(16px) saturate(1.4);
  border: 1px solid rgba(138, 92, 246, 0.15);
  animation: fadeIn 0.8s ease-out, glowPulse 5s ease-in-out infinite;
}
.greeting {
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(167, 139, 250, 0.7);
  margin-bottom: 12px;
  opacity: 0;
  animation: fadeIn 1s ease-out 0.3s forwards;
}
.time {
  font-size: 64px;
  font-weight: 600;
  letter-spacing: -2px;
  line-height: 1.1;
  background: linear-gradient(135deg, #ffffff 0%, #c4b5fd 25%, #8b5cf6 50%, #a78bfa 75%, #ffffff 100%);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradientShift 6s ease infinite;
}
.colon { animation: blink 2s step-end infinite; }
.seconds-bar {
  width: 70%;
  height: 2px;
  margin: 14px auto 0;
  background: rgba(138, 92, 246, 0.1);
  border-radius: 2px;
  overflow: hidden;
  opacity: 0;
  animation: fadeIn 1s ease-out 0.6s forwards;
}
.seconds-fill {
  height: 100%;
  background: linear-gradient(90deg, #7c3aed, #a78bfa, #c4b5fd);
  border-radius: 2px;
  transition: width 1s linear;
  box-shadow: 0 0 8px rgba(124, 58, 237, 0.5);
}
.date {
  font-size: 12px;
  font-weight: 300;
  color: rgba(160, 160, 180, 0.6);
  margin-top: 10px;
  letter-spacing: 1.5px;
  opacity: 0;
  animation: fadeIn 1s ease-out 0.5s forwards;
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="container">
  <div class="greeting" id="greeting"></div>
  <div class="time" id="time"></div>
  <div class="seconds-bar"><div class="seconds-fill" id="secBar"></div></div>
  <div class="date" id="date"></div>
</div>
<script>
const NAME = 'Musbah';
function updateClock() {
  const now = new Date();
  const h = now.getHours();
  let greet = 'Good evening';
  if (h < 12) greet = 'Good morning';
  else if (h < 17) greet = 'Good afternoon';
  document.getElementById('greeting').textContent = greet + ', ' + NAME;
  const timeStr = now.toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit', hour12: false });
  const parts = timeStr.split(':');
  document.getElementById('time').innerHTML = parts[0] + '<span class="colon">:</span>' + parts[1];
  document.getElementById('date').textContent = now.toLocaleDateString('en-CA', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  document.getElementById('secBar').style.width = ((now.getSeconds() / 59) * 100) + '%';
}
updateClock();
setInterval(updateClock, 1000);

const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);
const orbs = Array.from({ length: 5 }, () => ({
  x: Math.random() * innerWidth, y: Math.random() * innerHeight,
  r: 80 + Math.random() * 140, dx: (Math.random() - 0.5) * 0.3, dy: (Math.random() - 0.5) * 0.3,
  hue: 260 + Math.random() * 30, alpha: 0.04 + Math.random() * 0.06
}));
const particles = Array.from({ length: 60 }, () => ({
  x: Math.random() * innerWidth, y: Math.random() * innerHeight,
  r: 1 + Math.random() * 2, speed: 0.15 + Math.random() * 0.35,
  alpha: 0.2 + Math.random() * 0.5, flicker: Math.random() * Math.PI * 2
}));
function drawOrbs() {
  for (const o of orbs) {
    o.x += o.dx; o.y += o.dy;
    if (o.x < -o.r) o.x = W + o.r; if (o.x > W + o.r) o.x = -o.r;
    if (o.y < -o.r) o.y = H + o.r; if (o.y > H + o.r) o.y = -o.r;
    const g = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r);
    g.addColorStop(0, 'hsla(' + o.hue + ', 70%, 50%, ' + o.alpha + ')');
    g.addColorStop(1, 'hsla(' + o.hue + ', 70%, 50%, 0)');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2); ctx.fill();
  }
}
function drawParticles(time) {
  for (const p of particles) {
    p.y -= p.speed; if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
    const a = p.alpha * (0.5 + 0.5 * Math.sin(time * 0.002 + p.flicker));
    ctx.fillStyle = 'rgba(167, 139, 250, ' + a + ')';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  }
}
function animate(time) {
  ctx.clearRect(0, 0, W, H); drawOrbs(); drawParticles(time); requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
