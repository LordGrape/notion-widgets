<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

/* ── Base (light mode) ── */
:root {
  --bg: #ffffff;
  --card-bg: rgba(255, 255, 255, 0.96);
  --card-border: rgba(138, 92, 246, 0.12);
  --card-shadow: 0 4px 24px rgba(0,0,0,0.06);
  --card-glow: 0 0 20px 2px rgba(138, 92, 246, 0.06);
  --card-hover-shadow: 0 8px 32px rgba(0,0,0,0.1);
  --greeting-color: rgba(124, 58, 237, 0.5);
  --time-grad: linear-gradient(135deg, #1a1a2e 0%, #7c3aed 40%, #8b5cf6 60%, #1a1a2e 100%);
  --date-color: rgba(100, 100, 120, 0.5);
  --meta-color: rgba(100, 100, 120, 0.35);
  --dot-bg: rgba(138, 92, 246, 0.1);
  --dot-active: #8b5cf6;
  --dot-active-glow: 0 0 6px rgba(138, 92, 246, 0.4);
  --bar-bg: rgba(138, 92, 246, 0.08);
  --bar-fill: linear-gradient(90deg, #8b5cf6, #a78bfa, #c4b5fd);
  --bar-glow: 0 0 6px rgba(124, 58, 237, 0.2);
  --arc-track: rgba(138, 92, 246, 0.06);
  --orb-alpha: 0.025;
  --particle-rgb: 124, 58, 237;
  --particle-alpha: 0.12;
}

/* ── Dark mode ── */
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #191919;
    --card-bg: rgba(25, 25, 35, 0.94);
    --card-border: rgba(138, 92, 246, 0.15);
    --card-shadow: 0 8px 40px rgba(0,0,0,0.4);
    --card-glow: 0 0 24px 4px rgba(138, 92, 246, 0.12);
    --card-hover-shadow: 0 12px 48px rgba(0,0,0,0.5);
    --greeting-color: rgba(167, 139, 250, 0.65);
    --time-grad: linear-gradient(135deg, #fff 0%, #c4b5fd 25%, #8b5cf6 50%, #a78bfa 75%, #fff 100%);
    --date-color: rgba(160, 160, 180, 0.5);
    --meta-color: rgba(160, 160, 180, 0.35);
    --dot-bg: rgba(138, 92, 246, 0.15);
    --dot-active: #a78bfa;
    --dot-active-glow: 0 0 8px rgba(167, 139, 250, 0.5);
    --bar-bg: rgba(138, 92, 246, 0.1);
    --bar-fill: linear-gradient(90deg, #7c3aed, #a78bfa, #c4b5fd);
    --bar-glow: 0 0 8px rgba(124, 58, 237, 0.4);
    --arc-track: rgba(138, 92, 246, 0.08);
    --orb-alpha: 0.045;
    --particle-rgb: 167, 139, 250;
    --particle-alpha: 0.3;
  }
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
  transition: background 0.3s;
}

#bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes breathe {
  0%, 100% { box-shadow: var(--card-shadow), 0 0 0 0 transparent; }
  30%      { box-shadow: var(--card-shadow), var(--card-glow); }
}
@keyframes gradientShift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.2; }
}
@keyframes digitUp {
  from { transform: translateY(8px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}

/* Card */
.container {
  position: relative; z-index: 1;
  text-align: center;
  padding: 44px 48px 28px;
  border-radius: 22px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  animation: fadeIn 0.8s ease-out, breathe 8s cubic-bezier(0.4,0,0.2,1) infinite;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.container:hover {
  transform: translateY(-2px);
  box-shadow: var(--card-hover-shadow), var(--card-glow);
}

/* Greeting */
.greeting {
  font-size: 12px; font-weight: 300;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--greeting-color);
  margin-bottom: 20px;
  opacity: 0; animation: fadeIn 1s ease-out 0.3s forwards;
}

/* Arc wrap */
.arc-wrap {
  position: relative; display: inline-block;
  margin-bottom: 2px;
}
.arc-svg {
  position: absolute;
  top: -14px; left: -18px;
  width: calc(100% + 36px);
  height: calc(100% + 28px);
  pointer-events: none;
  opacity: 0; animation: fadeIn 1.2s ease-out 0.5s forwards;
}
.arc-track { fill: none; stroke: var(--arc-track); stroke-width: 2; }

/* Time */
.time {
  font-size: 64px; font-weight: 600;
  letter-spacing: -2px; line-height: 1.1;
  font-variant-numeric: tabular-nums;
  background: var(--time-grad);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradientShift 6s ease infinite;
}
.colon {
  animation: blink 2s step-end infinite;
  -webkit-text-fill-color: var(--dot-active);
  background: none;
}
.digit-change { display: inline-block; animation: digitUp 0.35s ease-out; }

/* Weekday dots */
.weekday-dots {
  display: flex; justify-content: center; gap: 14px;
  margin: 12px 0 4px;
  opacity: 0; animation: fadeIn 1s ease-out 0.55s forwards;
}
.weekday-dots .dot {
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--dot-bg);
  transition: all 0.4s ease;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-weight: 600; letter-spacing: 0;
  color: var(--date-color);
}
.weekday-dots .dot.active {
  background: var(--dot-active);
  box-shadow: var(--dot-active-glow);
  transform: scale(1.15);
  color: #fff;
}

/* Day progress bar */
.day-bar {
  width: 80%; height: 1.5px;
  margin: 10px auto 0;
  background: var(--bar-bg);
  border-radius: 2px; overflow: hidden;
  opacity: 0; animation: fadeIn 1s ease-out 0.6s forwards;
}
.day-fill {
  height: 100%;
  background: var(--bar-fill);
  border-radius: 2px;
  transition: width 60s linear;
  box-shadow: var(--bar-glow);
}

/* Date */
.date {
  font-size: 11.5px; font-weight: 300;
  color: var(--date-color);
  margin-top: 10px; letter-spacing: 1.5px;
  opacity: 0; animation: fadeIn 1s ease-out 0.65s forwards;
}

/* Next-hour countdown */
.countdown {
  font-size: 10px; font-weight: 300;
  color: var(--meta-color);
  margin-top: 6px; letter-spacing: 1px;
  opacity: 0; animation: fadeIn 1s ease-out 0.7s forwards;
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<svg style="position:absolute;width:0;height:0">
  <defs>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>
</svg>
<div class="container">
  <div class="greeting" id="greeting"></div>
  <div class="arc-wrap">
    <svg class="arc-svg" viewBox="0 0 200 90" preserveAspectRatio="none">
      <rect class="arc-track" x="1" y="1" width="198" height="88" rx="16" ry="16"/>
      <rect id="arcHand" x="1" y="1" width="198" height="88" rx="16" ry="16" fill="none" stroke="url(#arcGrad)" stroke-width="2" stroke-linecap="round" stroke-dasharray="560" stroke-dashoffset="560"/>
    </svg>
    <div class="time" id="time"></div>
  </div>
  <div class="weekday-dots" id="dots"></div>
  <div class="day-bar"><div class="day-fill" id="dayBar"></div></div>
  <div class="date" id="date"></div>
  <div class="countdown" id="countdown"></div>
</div>
<script>
const NAME = 'Musbah';
const DAYS = ['S','M','T','W','T','F','S'];
let prevDigits = '';

// Build weekday dots
const dotsEl = document.getElementById('dots');
DAYS.forEach(function(d, i) {
  var dot = document.createElement('div');
  dot.className = 'dot';
  dot.dataset.index = i;
  dot.title = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][i];
  dot.textContent = d;
  dotsEl.appendChild(dot);
});

function updateClock() {
  var now = new Date();
  var h = now.getHours();
  var m = now.getMinutes();
  var s = now.getSeconds();

  // Greeting
  var greet = 'Good evening';
  if (h < 12) greet = 'Good morning';
  else if (h < 17) greet = 'Good afternoon';
  document.getElementById('greeting').textContent = greet + ', ' + NAME;

  // Time with digit crossfade
  var hStr = String(h).padStart(2, '0');
  var mStr = String(m).padStart(2, '0');
  var digits = hStr + mStr;
  var timeHTML = '';
  for (var i = 0; i < 4; i++) {
    var cls = (prevDigits && digits[i] !== prevDigits[i]) ? ' digit-change' : '';
    timeHTML += '<span class="d' + i + cls + '">' + digits[i] + '</span>';
    if (i === 1) timeHTML += '<span class="colon">:</span>';
  }
  document.getElementById('time').innerHTML = timeHTML;
  prevDigits = digits;

  // Seconds arc
  var arcTotal = 560;
  var arcOffset = arcTotal - (s / 59) * arcTotal;
  document.getElementById('arcHand').style.strokeDashoffset = arcOffset;

  // Weekday dots
  var day = now.getDay();
  dotsEl.querySelectorAll('.dot').forEach(function(dot, idx) {
    dot.classList.toggle('active', idx === day);
  });

  // Day progress
  var dayProgress = ((h * 3600 + m * 60 + s) / 86400) * 100;
  document.getElementById('dayBar').style.width = dayProgress + '%';

  // Date
  document.getElementById('date').textContent =
    now.toLocaleDateString('en-CA', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

  // Next-hour countdown
  var minsLeft = 60 - m;
  var nextH = (h + 1) % 24;
  var nextHStr = String(nextH).padStart(2, '0') + ':00';
  document.getElementById('countdown').textContent = minsLeft + 'm : until ' + nextHStr;
}
updateClock();
setInterval(updateClock, 1000);

// ── Theme detection ──
const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
const ORB_ALPHA = isDark ? 0.045 : 0.025;
const P_RGB = isDark ? '167, 139, 250' : '124, 58, 237';
const P_ALPHA_BASE = isDark ? 0.3 : 0.12;

const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const orbs = Array.from({ length: 3 }, () => ({
  x: Math.random() * innerWidth, y: Math.random() * innerHeight,
  r: 80 + Math.random() * 140, dx: (Math.random() - 0.5) * 0.3, dy: (Math.random() - 0.5) * 0.3,
  hue: 260 + Math.random() * 30, alpha: ORB_ALPHA + Math.random() * 0.02
}));
const particles = Array.from({ length: isDark ? 25 : 15 }, () => ({
  x: Math.random() * innerWidth, y: Math.random() * innerHeight,
  r: 1 + Math.random() * 2, speed: 0.15 + Math.random() * 0.35,
  alpha: P_ALPHA_BASE * (0.4 + Math.random() * 0.6), flicker: Math.random() * Math.PI * 2
}));
function drawOrbs() {
  for (const o of orbs) {
    o.x += o.dx; o.y += o.dy;
    if (o.x < -o.r) o.x = W + o.r; if (o.x > W + o.r) o.x = -o.r;
    if (o.y < -o.r) o.y = H + o.r; if (o.y > H + o.r) o.y = -o.r;
    const g = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r);
    g.addColorStop(0, 'hsla(' + o.hue + ', 70%, 50%, ' + o.alpha + ')');
    g.addColorStop(1, 'hsla(' + o.hue + ', 70%, 50%, 0)');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2); ctx.fill();
  }
}
function drawParticles(time) {
  for (const p of particles) {
    p.y -= p.speed; if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
    const a = p.alpha * (0.5 + 0.5 * Math.sin(time * 0.002 + p.flicker));
    ctx.fillStyle = 'rgba(' + P_RGB + ', ' + a + ')';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  }
}
var animRunning = true;
var lastFrame = 0;
function animate(time) {
  if (!animRunning) return;
  if (time - lastFrame < 32) { requestAnimationFrame(animate); return; }
  lastFrame = time;
  ctx.clearRect(0, 0, W, H); drawOrbs(); drawParticles(time);
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
document.addEventListener('visibilitychange', function() {
  if (document.hidden) { animRunning = false; }
  else { animRunning = true; requestAnimationFrame(animate); }
});
</script>
</body>
</html>
