<!DOCTYPE html>
<html>
<head>
    <title>Clock</title>
    <style>
        .dot {
            height: 20px;
            width: 20px;
            border-radius: 50%;
            display: inline-block;
            margin: 2px;
            background-color: lightgray;
        }
        .highlight {
            background-color: blue;
        }
    </style>
</head>
<body>
    <h1>Week Representation</h1>
    <div id="week">
        <script>
            const currentDate = new Date('2026-04-03T23:52:11Z');
            const weekDots = document.getElementById('week');
            // Representing a week starting with Monday
            const daysInWeek = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
            const currentDayIndex = currentDate.getUTCDay() === 0 ? 6 : currentDate.getUTCDay() - 1;
            daysInWeek.forEach((day, index) => {
                const dot = document.createElement('span');
                dot.className = 'dot';
                if (index === currentDayIndex) {
                    dot.classList.add('highlight');
                }
                weekDots.appendChild(dot);
            });
        </script>
    </div>
</body>
</html>
