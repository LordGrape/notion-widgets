<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock Widget</title>
    <style>
        /* CSS styles for better performance and animations */
        body {
            background-color: #f0f0f0;
            color: #333;
            font-family: Arial, sans-serif;
        }
        .clock {
            font-size: 48px;
            text-align: center;
            margin-top: 20%;
        }
    </style>
</head>
<body>
    <div class="clock" role="status" aria-live="polite">
        <!-- The clock will be updated with JavaScript -->
        <span id="time">Loading...</span>
    </div>
    <script>
        const DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        const particles = 100; // Reduced particle count for optimization

        function updateTime() {
            const now = new Date();
            const day = DAYS[now.getDay() === 0 ? 6 : now.getDay() - 1]; // Adjusted for Monday start
            const formattedTime = now.toUTCString().replace(/ GMT.*$/, ''); // Improved date formatting
            document.getElementById('time').innerText = `${day}, ${formattedTime}`;
        }

        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
