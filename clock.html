<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ── Base (light mode) ── */
:root {
  --bg: #ffffff;
  --card-bg: rgba(255, 255, 255, 0.96);
  --card-border: rgba(138, 92, 246, 0.12);
  --card-shadow: 0 4px 24px rgba(0,0,0,0.06);
  --card-glow: 0 0 20px 2px rgba(138, 92, 246, 0.06);
  --card-hover-shadow: 0 8px 32px rgba(0,0,0,0.1);
  --greeting-color: rgba(124, 58, 237, 0.5);
  --time-grad: linear-gradient(135deg, #1a1a2e 0%, #7c3aed 40%, #8b5cf6 60%, #1a1a2e 100%);
  --date-color: rgba(100, 100, 120, 0.5);
  --meta-color: rgba(100, 100, 120, 0.35);
  --dot-bg: rgba(138, 92, 246, 0.1);
  --dot-active: #8b5cf6;
  --dot-active-glow: 0 0 6px rgba(138, 92, 246, 0.4);
  --bar-bg: rgba(138, 92, 246, 0.08);
  --bar-fill: linear-gradient(90deg, #8b5cf6, #a78bfa, #c4b5fd);
  --bar-glow: 0 0 6px rgba(124, 58, 237, 0.2);
  --arc-track: rgba(138, 92, 246, 0.06);
  --mesh-1: hsla(260, 70%, 55%, 0.15);
  --mesh-2: hsla(210, 75%, 50%, 0.12);
  --mesh-3: hsla(320, 65%, 50%, 0.08);
  --bokeh-1: hsla(260, 80%, 65%, 0.25);
  --bokeh-2: hsla(200, 85%, 60%, 0.2);
  --bokeh-3: hsla(330, 70%, 60%, 0.18);
  --bokeh-4: hsla(175, 70%, 55%, 0.15);
  --bokeh-5: hsla(280, 75%, 70%, 0.2);
}

/* ── Dark mode ── */
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #191919;
    --card-bg: rgba(25, 25, 35, 0.94);
    --card-border: rgba(138, 92, 246, 0.15);
    --card-shadow: 0 8px 40px rgba(0,0,0,0.4);
    --card-glow: 0 0 24px 4px rgba(138, 92, 246, 0.12);
    --card-hover-shadow: 0 12px 48px rgba(0,0,0,0.5);
    --greeting-color: rgba(167, 139, 250, 0.65);
    --time-grad: linear-gradient(135deg, #fff 0%, #c4b5fd 25%, #8b5cf6 50%, #a78bfa 75%, #fff 100%);
    --date-color: rgba(160, 160, 180, 0.5);
    --meta-color: rgba(160, 160, 180, 0.35);
    --dot-bg: rgba(138, 92, 246, 0.15);
    --dot-active: #a78bfa;
    --dot-active-glow: 0 0 8px rgba(167, 139, 250, 0.5);
    --bar-bg: rgba(138, 92, 246, 0.1);
    --bar-fill: linear-gradient(90deg, #7c3aed, #a78bfa, #c4b5fd);
    --bar-glow: 0 0 8px rgba(124, 58, 237, 0.4);
    --arc-track: rgba(138, 92, 246, 0.08);
    --mesh-1: hsla(260, 70%, 45%, 0.2);
    --mesh-2: hsla(210, 75%, 45%, 0.15);
    --mesh-3: hsla(320, 65%, 45%, 0.1);
    --bokeh-1: hsla(260, 80%, 70%, 0.35);
    --bokeh-2: hsla(200, 85%, 65%, 0.28);
    --bokeh-3: hsla(330, 70%, 65%, 0.22);
    --bokeh-4: hsla(175, 70%, 60%, 0.2);
    --bokeh-5: hsla(280, 75%, 75%, 0.3);
  }
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
  transition: background 0.3s;
}

/* ── CSS Mesh Gradient Background (replaces canvas) ── */
.bg-mesh {
  position: fixed;
  top: -20%; left: -20%;
  width: 140%; height: 140%;
  background:
    radial-gradient(ellipse at 25% 30%, var(--mesh-1) 0%, transparent 55%),
    radial-gradient(ellipse at 75% 65%, var(--mesh-2) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, var(--mesh-3) 0%, transparent 60%);
  animation: meshHue 12s ease infinite alternate;
  z-index: 0;
  pointer-events: none;
}
@keyframes meshHue {
  0% { filter: hue-rotate(0deg) brightness(1); }
  33% { filter: hue-rotate(25deg) brightness(1.05); }
  66% { filter: hue-rotate(-15deg) brightness(0.97); }
  100% { filter: hue-rotate(10deg) brightness(1.02); }
}

/* ── Floating Bokeh Dots ── */
.bokeh {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}
.bokeh--1 {
  width: 40px; height: 40px;
  background: var(--bokeh-1);
  top: 12%; left: 8%;
  animation: bokehFloat1 22s ease-in-out infinite alternate;
}
.bokeh--2 {
  width: 28px; height: 28px;
  background: var(--bokeh-2);
  top: 25%; right: 12%;
  animation: bokehFloat2 18s ease-in-out infinite alternate;
}
.bokeh--3 {
  width: 35px; height: 35px;
  background: var(--bokeh-3);
  bottom: 18%; left: 15%;
  animation: bokehFloat3 25s ease-in-out infinite alternate;
}
.bokeh--4 {
  width: 22px; height: 22px;
  background: var(--bokeh-4);
  bottom: 10%; right: 20%;
  animation: bokehFloat4 20s ease-in-out infinite alternate;
}
.bokeh--5 {
  width: 18px; height: 18px;
  background: var(--bokeh-5);
  top: 50%; left: 45%;
  animation: bokehFloat5 15s ease-in-out infinite alternate;
}
@keyframes bokehFloat1 {
  0% { transform: translate(0, 0) scale(1); opacity: 0.7; }
  25% { transform: translate(50px, 30px) scale(1.3); opacity: 1; }
  50% { transform: translate(-20px, 60px) scale(0.8); opacity: 0.5; }
  75% { transform: translate(40px, -20px) scale(1.1); opacity: 0.9; }
  100% { transform: translate(-10px, 40px) scale(1); opacity: 0.7; }
}
@keyframes bokehFloat2 {
  0% { transform: translate(0, 0) scale(1); opacity: 0.6; }
  33% { transform: translate(-40px, 25px) scale(1.4); opacity: 1; }
  66% { transform: translate(30px, -35px) scale(0.7); opacity: 0.4; }
  100% { transform: translate(-15px, 10px) scale(1.1); opacity: 0.8; }
}
@keyframes bokehFloat3 {
  0% { transform: translate(0, 0) scale(1); opacity: 0.8; }
  50% { transform: translate(45px, -40px) scale(1.2); opacity: 0.5; }
  100% { transform: translate(-25px, 20px) scale(0.9); opacity: 1; }
}
@keyframes bokehFloat4 {
  0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
  40% { transform: translate(-30px, -25px) scale(1.5); opacity: 1; }
  80% { transform: translate(20px, 35px) scale(0.8); opacity: 0.6; }
  100% { transform: translate(10px, -15px) scale(1.2); opacity: 0.7; }
}
@keyframes bokehFloat5 {
  0% { transform: translate(0, 0) scale(1); opacity: 0.6; }
  50% { transform: translate(-35px, 30px) scale(1.6); opacity: 1; }
  100% { transform: translate(25px, -20px) scale(0.7); opacity: 0.4; }
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes breathe {
  0%, 100% { transform: scale(1); opacity: 1; }
  50%      { transform: scale(1.003); opacity: 0.97; }
}
@keyframes gradientShift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.2; }
}
@keyframes digitUp {
  from { transform: translateY(8px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}

/* Card */
.container {
  position: relative; z-index: 1;
  text-align: center;
  padding: 44px 48px 28px;
  border-radius: 22px;
  background: var(--card-bg);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border: 1px solid var(--card-border);
  opacity: 0;
  animation: fadeIn 0.8s ease-out forwards, breathe 8s cubic-bezier(0.4,0,0.2,1) 0.8s infinite;
  transition: transform 0.3s ease;
  will-change: transform, opacity;
}
.container:hover {
  transform: translateY(-2px) scale(1.005);
}

/* Greeting */
.greeting {
  font-size: 12px; font-weight: 300;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--greeting-color);
  margin-bottom: 20px;
  opacity: 0; animation: fadeIn 1s ease-out 0.3s forwards;
}

/* Arc wrap */
.arc-wrap {
  position: relative; display: inline-block;
  margin-bottom: 2px;
}
.arc-svg {
  position: absolute;
  top: -14px; left: -18px;
  width: calc(100% + 36px);
  height: calc(100% + 28px);
  pointer-events: none;
  opacity: 0; animation: fadeIn 1.2s ease-out 0.5s forwards;
}
.arc-track { fill: none; stroke: var(--arc-track); stroke-width: 2; }

/* Time */
.time {
  font-size: 64px; font-weight: 600;
  letter-spacing: -2px; line-height: 1.1;
  font-variant-numeric: tabular-nums;
  background: var(--time-grad);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradientShift 6s ease infinite;
}
.colon {
  animation: blink 2s step-end infinite;
  -webkit-text-fill-color: var(--dot-active);
  background: none;
}
.digit-change { display: inline-block; animation: digitUp 0.35s ease-out; }

/* Weekday dots */
.weekday-dots {
  display: flex; justify-content: center; gap: 14px;
  margin: 12px 0 4px;
  opacity: 0; animation: fadeIn 1s ease-out 0.55s forwards;
}
.weekday-dots .dot {
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--dot-bg);
  transition: all 0.4s ease;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-weight: 600; letter-spacing: 0;
  color: var(--date-color);
}
.weekday-dots .dot.active {
  background: var(--dot-active);
  box-shadow: var(--dot-active-glow);
  transform: scale(1.15);
  color: #fff;
}

/* Day progress bar */
.day-bar {
  width: 80%; height: 1.5px;
  margin: 10px auto 0;
  background: var(--bar-bg);
  border-radius: 2px; overflow: hidden;
  opacity: 0; animation: fadeIn 1s ease-out 0.6s forwards;
}
.day-fill {
  height: 100%;
  background: var(--bar-fill);
  border-radius: 2px;
  transition: width 60s linear;
  box-shadow: var(--bar-glow);
}

/* Date */
.date {
  font-size: 11.5px; font-weight: 300;
  color: var(--date-color);
  margin-top: 10px; letter-spacing: 1.5px;
  opacity: 0; animation: fadeIn 1s ease-out 0.65s forwards;
}

/* Next-hour countdown */
.countdown {
  font-size: 10px; font-weight: 300;
  color: var(--meta-color);
  margin-top: 6px; letter-spacing: 1px;
  opacity: 0; animation: fadeIn 1s ease-out 0.7s forwards;
}
</style>
</head>
<body>
<!-- CSS-only background -->
<div class="bg-mesh"></div>
<div class="bokeh bokeh--1"></div>
<div class="bokeh bokeh--2"></div>
<div class="bokeh bokeh--3"></div>
<div class="bokeh bokeh--4"></div>
<div class="bokeh bokeh--5"></div>

<svg style="position:absolute;width:0;height:0">
  <defs>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>
</svg>
<div class="container">
  <div class="greeting" id="greeting"></div>
  <div class="arc-wrap">
    <svg class="arc-svg" viewBox="0 0 200 90" preserveAspectRatio="none">
      <rect class="arc-track" x="1" y="1" width="198" height="88" rx="16" ry="16"/>
      <rect id="arcHand" x="1" y="1" width="198" height="88" rx="16" ry="16" fill="none" stroke="url(#arcGrad)" stroke-width="2" stroke-linecap="round" stroke-dasharray="560" stroke-dashoffset="560"/>
    </svg>
    <div class="time" id="time"></div>
  </div>
  <div class="weekday-dots" id="dots"></div>
  <div class="day-bar"><div class="day-fill" id="dayBar"></div></div>
  <div class="date" id="date"></div>
  <div class="countdown" id="countdown"></div>
</div>
<script>
const NAME = 'Musbah';
const DAYS = ['S','M','T','W','T','F','S'];
let prevDigits = '';

// Build weekday dots
const dotsEl = document.getElementById('dots');
DAYS.forEach(function(d, i) {
  var dot = document.createElement('div');
  dot.className = 'dot';
  dot.dataset.index = i;
  dot.title = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][i];
  dot.textContent = d;
  dotsEl.appendChild(dot);
});

function updateClock() {
  var now = new Date();
  var h = now.getHours();
  var m = now.getMinutes();
  var s = now.getSeconds();

  // Greeting
  var greet = 'Good evening';
  if (h < 12) greet = 'Good morning';
  else if (h < 17) greet = 'Good afternoon';
  document.getElementById('greeting').textContent = greet + ', ' + NAME;

  // Time with digit crossfade
  var hStr = String(h).padStart(2, '0');
  var mStr = String(m).padStart(2, '0');
  var digits = hStr + mStr;
  var timeHTML = '';
  for (var i = 0; i < 4; i++) {
    var cls = (prevDigits && digits[i] !== prevDigits[i]) ? ' digit-change' : '';
    timeHTML += '<span class="d' + i + cls + '">' + digits[i] + '</span>';
    if (i === 1) timeHTML += '<span class="colon">:</span>';
  }
  document.getElementById('time').innerHTML = timeHTML;
  prevDigits = digits;

  // Seconds arc
  var arcTotal = 560;
  var arcOffset = arcTotal - (s / 59) * arcTotal;
  document.getElementById('arcHand').style.strokeDashoffset = arcOffset;

  // Weekday dots
  var day = now.getDay();
  dotsEl.querySelectorAll('.dot').forEach(function(dot, idx) {
    dot.classList.toggle('active', idx === day);
  });

  // Day progress
  var dayProgress = ((h * 3600 + m * 60 + s) / 86400) * 100;
  document.getElementById('dayBar').style.width = dayProgress + '%';

  // Date
  document.getElementById('date').textContent =
    now.toLocaleDateString('en-CA', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

  // Next-hour countdown
  var minsLeft = 60 - m;
  var nextH = (h + 1) % 24;
  var nextHStr = String(nextH).padStart(2, '0') + ':00';
  document.getElementById('countdown').textContent = minsLeft + 'm : until ' + nextHStr;
}
updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
